<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本語クイズ | SUZU先生</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF6F0;
      --blush: #F2E0D5;
      --rose: #C9897A;
      --deep: #6B3D3D;
      --ink: #2C1F1F;
      --sage: #8B9E8A;
      --gold: #C4A46B;
      --mist: #E8EEE8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    .quiz-header {
      background: var(--deep);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }
    .back-btn:hover { color: white; }
    .quiz-header-title {
      font-family: 'Noto Serif JP', serif;
      color: white;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      background: var(--blush);
      border-bottom: 1px solid rgba(107,61,61,0.12);
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1;
      min-width: 90px;
      padding: 13px 6px;
      background: none;
      border: none;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      color: #9a7070;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: var(--deep);
      border-bottom-color: var(--rose);
      font-weight: 500;
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; padding: 28px 20px 60px; }
    .tab-panel.active { display: block; }
    .game-wrap { max-width: 480px; margin: 0 auto; }

    /* ── Progress & score ── */
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 1px;
      color: #b09090;
    }
    .progress-bar { background: var(--blush); height: 5px; border-radius: 3px; margin-bottom: 24px; }
    .progress-fill { background: var(--rose); height: 100%; border-radius: 3px; transition: width 0.5s ease; }

    /* ── Prompt ── */
    .prompt-box { text-align: center; margin-bottom: 28px; }
    .prompt-main {
      font-family: 'Noto Serif JP', serif;
      font-size: 52px;
      font-weight: 300;
      color: var(--deep);
      letter-spacing: 4px;
      line-height: 1.2;
    }
    .prompt-sub {
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: 2.5px;
      color: var(--gold);
    }

    /* ── Answer area ── */
    .answer-area {
      min-height: 58px;
      background: white;
      border: 2px solid var(--blush);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }
    .answer-area.correct-state { border-color: var(--sage); background: #f2f7f2; }
    .answer-area.wrong-state { border-color: var(--rose); animation: shake 0.4s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .answer-placeholder { font-size: 12px; color: rgba(107,61,61,0.3); letter-spacing: 2px; }

    .placed-tile {
      background: var(--deep);
      color: white;
      padding: 8px 13px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .placed-tile:hover { background: var(--rose); }

    /* ── Tile bank ── */
    .tile-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
      min-height: 52px;
    }
    .tile {
      background: var(--blush);
      color: var(--deep);
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
      min-width: 46px;
      text-align: center;
      user-select: none;
    }
    .tile:hover { background: var(--rose); color: white; transform: translateY(-2px); }
    .tile:active { transform: translateY(0); }
    .tile.used { opacity: 0.25; pointer-events: none; }

    /* ── Reveal card ── */
    .reveal-card {
      display: none;
      background: white;
      border: 1px solid var(--blush);
      border-radius: 10px;
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease;
    }
    .reveal-card.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 38px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 6px;
    }
    .reveal-romaji { font-size: 14px; color: var(--rose); letter-spacing: 2px; margin-bottom: 16px; }
    .reveal-tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .reveal-tag {
      background: var(--mist);
      color: var(--sage);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* ── Buttons ── */
    .next-btn {
      background: var(--rose);
      color: white;
      border: none;
      padding: 13px 36px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.25s;
    }
    .next-btn:hover { background: var(--deep); transform: translateY(-1px); }

    .restart-btn {
      background: var(--deep);
      color: white;
      border: none;
      padding: 13px 36px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.25s;
    }
    .restart-btn:hover { background: var(--rose); }

    /* ── Complete screen ── */
    .complete-screen { display: none; text-align: center; padding: 40px 20px; }
    .complete-screen.show { display: block; }
    .complete-emoji { font-size: 56px; margin-bottom: 14px; }
    .complete-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 8px;
    }
    .complete-score { font-size: 13px; color: #9a8080; margin-bottom: 28px; }
    .complete-subtitle { font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-bottom: 28px; }

    /* ── て形 game ── */
    .te-prompt { text-align: center; margin-bottom: 28px; }
    .te-masu {
      font-family: 'Noto Serif JP', serif;
      font-size: 44px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 6px;
    }
    .te-hint { font-size: 12px; color: #b09090; letter-spacing: 1px; }
    .te-arrow { font-size: 20px; color: var(--rose); margin: 4px 0; }

    .choices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .choice-btn {
      background: white;
      border: 2px solid var(--blush);
      border-radius: 6px;
      padding: 15px 20px;
      font-family: 'Noto Serif JP', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--deep);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--rose); background: var(--blush); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct-choice { background: #eaf4ea; border-color: var(--sage); color: #3a6a3a; }
    .choice-btn.wrong-choice { background: #fce8e8; border-color: #c97a7a; color: #8a3a3a; }

    .explanation {
      background: var(--mist);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 12px;
      color: #5a7a5a;
      line-height: 2;
      display: none;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .explanation.show { display: block; }

    .next-wrap { text-align: center; display: none; }
    .next-wrap.show { display: block; }

    /* ── Intro card ── */
    .intro-card {
      background: white;
      border: 1px solid var(--blush);
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 24px;
    }
    .intro-icon { font-size: 36px; margin-bottom: 10px; }
    .intro-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .intro-desc { font-size: 12px; color: #9a8080; line-height: 2; }

    /* ── Hint label ── */
    .hint-label {
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: #c4a8a8;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header class="quiz-header">

// ═══════════════════════════════
//  TAB SWITCH
// ═══════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ═══════════════════════════════
//  SHARED ANAGRAM ENGINE
// ═══════════════════════════════
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

const gState = {
  t1: { bank: BANK1, words:[], cur:0, correct:0, placed:[] },
  t2: { bank: BANK2, words:[], cur:0, correct:0, placed:[] },
};

function gStart(id) {
  const s = gState[id];
  s.words   = shuffle(s.bank).slice(0, 10);
  s.cur     = 0;
  s.correct = 0;
  s.placed  = [];
  document.getElementById(id+'-done').classList.remove('show');
  document.getElementById(id+'-game').style.display = 'block';
  gLoad(id);
}

function gLoad(id) {
  const s = gState[id];
  const w = s.words[s.cur];
  s.placed = [];

  // Prompt
  document.getElementById(id+'-prompt').textContent = w.prompt;
  document.getElementById(id+'-cat').textContent    = w.cat;
  document.getElementById(id+'-reveal').classList.remove('show');

  // Answer area
  const ans = document.getElementById(id+'-ans');
  ans.innerHTML = '<span class="answer-placeholder">ここに答えが並びます</span>';
  ans.className = 'answer-area';

  // Progress
  const total = s.words.length;
  document.getElementById(id+'-prog').style.width = (s.cur / total * 100) + '%';
  document.getElementById(id+'-score').textContent = s.correct + ' / ' + s.cur;
  document.getElementById(id+'-qnum').textContent = (s.cur+1) + ' / ' + total;

  // Tiles — each tile gets a unique index even if same text
  const shuffled = shuffle(w.parts.map((v, i) => ({ v, i })));
  const bank = document.getElementById(id+'-bank');
  bank.innerHTML = '';
  shuffled.forEach(({ v, i }) => {
    const btn = document.createElement('button');
    btn.className = 'tile';
    btn.textContent = v;
    btn.dataset.idx = i;
    btn.onclick = () => gTap(id, btn, i, v);
    bank.appendChild(btn);
  });
}

function gTap(id, btn, idx, val) {
  if (btn.classList.contains('used')) return;
  btn.classList.add('used');
  const s = gState[id];
  s.placed.push({ idx, val, btn });

  const ans = document.getElementById(id+'-ans');
  const ph = ans.querySelector('.answer-placeholder');
  if (ph) ph.remove();

  const tile = document.createElement('span');
  tile.className = 'placed-tile';
  tile.textContent = val;
  tile.onclick = () => gRemove(id, tile, idx, btn);
  ans.appendChild(tile);

  const w = s.words[s.cur];
  if (s.placed.length === w.parts.length) gCheck(id);
}

function gRemove(id, tile, idx, origBtn) {
  const s = gState[id];
  let removed = false;
  s.placed = s.placed.filter(p => {
    if (!removed && p.idx === idx) { removed = true; return false; }
    return true;
  });
  tile.remove();
  origBtn.classList.remove('used');

  const ans = document.getElementById(id+'-ans');
  if (!ans.querySelector('.placed-tile')) {
    ans.innerHTML = '<span class="answer-placeholder">ここに答えが並びます</span>';
  }
}

function gCheck(id) {
  const s = gState[id];
  const w = s.words[s.cur];
  const ans = document.getElementById(id+'-ans');
  const user   = s.placed.map(p => p.val).join('');
  const correct = w.parts.join('');

  if (user === correct) {
    ans.classList.add('correct-state');
    s.correct++;
    document.getElementById(id+'-score').textContent = s.correct + ' / ' + (s.cur+1);
    // Show reveal
    document.getElementById(id+'-kanji').textContent  = w.kanji;
    document.getElementById(id+'-romaji').textContent = w.parts.join('-');
    document.getElementById(id+'-zh').textContent     = w.zh;
    document.getElementById(id+'-en').textContent     = w.en;
    document.getElementById(id+'-reveal').classList.add('show');
  } else {
    ans.classList.add('wrong-state');
    setTimeout(() => {
      ans.classList.remove('wrong-state');
      s.placed = [];
      ans.innerHTML = '<span class="answer-placeholder">ここに答えが並びます</span>';
      document.querySelectorAll('#'+id+'-bank .tile').forEach(t => t.classList.remove('used'));
    }, 500);
  }
}

function gNext(id) {
  const s = gState[id];
  s.cur++;
  if (s.cur >= s.words.length) {
    document.getElementById(id+'-game').style.display = 'none';
    document.getElementById(id+'-prog').style.width = '100%';
    document.getElementById(id+'-done').classList.add('show');
    document.getElementById(id+'-done-score').textContent =
      '正解 ' + s.correct + ' / ' + s.words.length + ' 問';
  } else {
    gLoad(id);
  }
}

// ═══════════════════════════════
//  て形 GAME
// ═══════════════════════════════
const t3State = { qs:[], cur:0, correct:0 };

function t3Start() {
  t3State.qs      = shuffle(BANK3).slice(0, 10);
  t3State.cur     = 0;
  t3State.correct = 0;
  document.getElementById('t3-done').classList.remove('show');
  document.getElementById('t3-game').style.display = 'block';
  t3Load();
}

function t3Load() {
  const q = t3State.qs[t3State.cur];
  document.getElementById('t3-masu').textContent = q.masu;
  document.getElementById('t3-exp').className = 'explanation';
  document.getElementById('t3-next').className = 'next-wrap';

  const total = t3State.qs.length;
  document.getElementById('t3-prog').style.width = (t3State.cur / total * 100) + '%';
  document.getElementById('t3-score').textContent = t3State.correct + ' / ' + t3State.cur;
  document.getElementById('t3-qnum').textContent  = (t3State.cur+1) + ' / ' + total;

  // 3 choices: 1 correct + 2 wrong
  const wrong = shuffle(BANK3.filter(b => b.te !== q.te)).slice(0, 2).map(b => b.te);
  const choices = shuffle([q.te, ...wrong]);

  const box = document.getElementById('t3-choices');
  box.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => t3Answer(c, q, btn);
    box.appendChild(btn);
  });
}

function t3Answer(choice, q, clicked) {
  document.querySelectorAll('#t3-choices .choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.te) b.classList.add('correct-choice');
  });
  if (choice === q.te) {
    t3State.correct++;
    clicked.classList.add('correct-choice');
  } else {
    clicked.classList.add('wrong-choice');
  }
  document.getElementById('t3-score').textContent = t3State.correct + ' / ' + (t3State.cur+1);
  document.getElementById('t3-exp').textContent = '【' + q.kanji + '】' + q.rule;
  document.getElementById('t3-exp').classList.add('show');
  document.getElementById('t3-next').classList.add('show');
}

function t3Next() {
  t3State.cur++;
  if (t3State.cur >= t3State.qs.length) {
    document.getElementById('t3-game').style.display = 'none';
    document.getElementById('t3-prog').style.width = '100%';
    document.getElementById('t3-done').classList.add('show');
    document.getElementById('t3-done-score').textContent =
      '正解 ' + t3State.correct + ' / ' + t3State.qs.length + ' 問';
  } else {
    t3Load();
  }
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
gStart('t1');
gStart('t2');
t3Start();
