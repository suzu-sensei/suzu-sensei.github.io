<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語クイズ | SUZU先生</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="suzu-auth.js"></script>
<style>
:root{--cream:#FAF6F0;--blush:#F2E0D5;--rose:#C9897A;--deep:#6B3D3D;--ink:#2C1F1F;--sage:#8B9E8A;--gold:#C4A46B;--mist:#E8EEE8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

.quiz-header{background:var(--deep);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-left{display:flex;align-items:center;gap:14px;}
.back-btn{color:rgba(255,255,255,0.6);text-decoration:none;font-size:12px;letter-spacing:1.5px;}
.back-btn:hover{color:white;}
.quiz-header-title{font-family:'Noto Serif JP',serif;color:white;font-size:15px;font-weight:300;letter-spacing:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.user-info{color:rgba(255,255,255,0.7);font-size:11px;letter-spacing:1px;}
.logout-btn{background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);padding:6px 12px;border-radius:4px;font-size:10px;cursor:pointer;}
.logout-btn:hover{background:var(--rose);}

.login-screen{display:none;min-height:100vh;background:linear-gradient(135deg,var(--deep),var(--rose));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.login-screen.show{display:flex;}
.login-title{font-family:'Noto Serif JP',serif;font-size:28px;color:white;margin-bottom:12px;letter-spacing:2px;}
.login-desc{color:rgba(255,255,255,0.8);font-size:14px;margin-bottom:40px;max-width:360px;}
#google-signin-btn{margin:0 auto;}

.tab-bar{display:flex;background:var(--blush);border-bottom:1px solid rgba(107,61,61,0.1);overflow-x:auto;}
.tab-btn{flex:1;min-width:80px;padding:12px 4px;background:none;border:none;font-family:'Zen Kaku Gothic New',sans-serif;font-size:11px;letter-spacing:1px;color:#2C1F1F;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
.tab-btn.active{color:var(--deep);border-bottom-color:var(--rose);font-weight:500;}

.tab-panel{display:none;padding:24px 18px 80px;}
.tab-panel.active{display:block;}
.game-wrap{max-width:460px;margin:0 auto;}

.prompt-box{text-align:center;margin-bottom:24px;}
.prompt-main{font-family:'Zen Kaku Gothic New',sans-serif;font-size:48px;font-weight:300;color:var(--deep);letter-spacing:4px;line-height:1.2;}
.prompt-sub{margin-top:5px;font-size:11px;letter-spacing:2.5px;color:var(--gold);}

.next-btn{background:var(--rose);color:white;border:none;padding:12px 32px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all 0.25s;width:100%;margin-bottom:10px;}
.next-btn:hover{background:var(--deep);transform:translateY(-1px);}

.complete-screen{display:none;text-align:center;padding:32px 16px;}
.complete-screen.show{display:block;}
.complete-emoji{font-size:52px;margin-bottom:12px;}
.complete-title{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:300;color:var(--deep);margin-bottom:6px;}
.complete-score{font-size:14px;color:#9a8080;margin-bottom:24px;}
.back-home-btn{background:var(--deep);color:white;border:none;padding:12px 40px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:4px;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-screen show" id="loginScreen">
  <div class="login-title">JLPT 単語カード</div>
  <div class="login-desc">Gmailでログインして、学習を続けましょう</div>
  <div id="google-signin-btn"></div>
</div>

<!-- ゲーム画面 -->
<div id="gameContainer" style="display:none;">
  <header class="quiz-header">
    <div class="header-left">
      <a href="/" class="back-btn">← HOME</a>
      <div class="quiz-header-title">📖 JLPT 単語</div>
    </div>
    <div class="header-right">
      <div class="user-info" id="userDisplay"></div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>
  <div class="tab-bar" id="tabBar"></div>
  <div id="tabContent"></div>
</div>

<script>
// ログイン・スコア保存・ランキングは共通ファイル suzu-auth.js に集約
window.onload = function () {
  if (SuzuAuth.isLoggedIn()) { showGameScreen(); return; }
  SuzuAuth.initButton('google-signin-btn', () => showGameScreen());
};

function showGameScreen() {
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('gameContainer').style.display = 'block';
  const u = SuzuAuth.user();
  document.getElementById('userDisplay').textContent = SuzuAuth.nickname() || (u && u.name) || '';
  loadQuizLevels();
}

function logout() {
  SuzuAuth.logout();
  document.getElementById('gameContainer').style.display = 'none';
  document.getElementById('loginScreen').classList.add('show');
  location.reload();
}

const quizLevels = {
  'N1': [
    { kanji: '齟齬', romaji: 'そご', meaning: '意見の相違', options: ['そご', 'きご', 'そかい'] },
    { kanji: '沈黙', romaji: 'ちんもく', meaning: '黙ること', options: ['ちんもく', 'せんもく', 'ちゅんもく'] }
  ],
  'N2': [
    { kanji: '努力', romaji: 'どりょく', meaning: '頑張ること', options: ['どりょく', 'のうりょく', 'どうりょく'] }
  ],
  'N3': [
    { kanji: '猫', romaji: 'ねこ', meaning: 'cat', options: ['ねこ', 'ぬこ', 'にこ'] }
  ]
};

function loadQuizLevels() {
  const tabBar = document.getElementById('tabBar');
  const tabContent = document.getElementById('tabContent');
  tabBar.innerHTML = '';
  tabContent.innerHTML = '';

  Object.keys(quizLevels).forEach((level, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = level;
    btn.onclick = () => selectLevel(level);
    tabBar.appendChild(btn);
  });

  // 🏆 ランキングタブ
  const rankBtn = document.createElement('button');
  rankBtn.className = 'tab-btn';
  rankBtn.textContent = '🏆 ランキング';
  rankBtn.onclick = () => renderRanking(rankBtn);
  tabBar.appendChild(rankBtn);

  selectLevel('N1');
}

async function renderRanking(activeBtn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === activeBtn));
  const tabContent = document.getElementById('tabContent');
  tabContent.innerHTML = '<div class="tab-panel active"><div class="game-wrap"><p style="text-align:center;color:#9a8080;padding:30px;">読み込み中…</p></div></div>';
  const rows = await SuzuAuth.leaderboard(50);
  const myNick = SuzuAuth.nickname();
  let html = '<div class="tab-panel active"><div class="game-wrap">'
    + '<div class="prompt-box"><div class="prompt-sub" style="font-size:13px;color:var(--gold);">🏆 みんなのポイントランキング</div></div>';
  if (!rows.length) {
    html += '<p style="text-align:center;color:#9a8080;padding:20px;">まだ記録がありません。クイズを解いてポイントを貯めよう！</p>';
  } else {
    rows.forEach((r, i) => {
      const rk = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      const me = r.nickname === myNick;
      html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;border-radius:10px;'
        + (me ? 'background:var(--blush);border:1px solid var(--rose);' : 'background:white;border:1px solid #eee;') + '">'
        + '<div style="width:34px;text-align:center;font-weight:700;color:var(--deep);">' + rk + '</div>'
        + '<div style="flex:1;font-weight:' + (me ? '700' : '400') + ';">' + escapeHtml(r.nickname) + (me ? '（あなた）' : '') + '</div>'
        + '<div style="color:var(--rose);font-weight:700;">' + r.total_points + ' pt</div></div>';
    });
  }
  html += '<button class="next-btn" style="margin-top:14px;" onclick="SuzuAuth.changeNickname()&&renderRanking(document.querySelector(\'.tab-btn:last-child\'))">✏️ ニックネームを変える</button>';
  html += '</div></div>';
  tabContent.innerHTML = html;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function selectLevel(level) {
  const questions = quizLevels[level];
  const tabContent = document.getElementById('tabContent');
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach((btn, idx) => {
    btn.classList.toggle('active', Object.keys(quizLevels)[idx] === level);
  });

  tabContent.innerHTML = '';
  const panel = document.createElement('div');
  panel.className = 'tab-panel active';
  const gameWrap = document.createElement('div');
  gameWrap.className = 'game-wrap';
  panel.appendChild(gameWrap);
  tabContent.appendChild(panel);

  let currentQ = 0;
  let score = 0;

  function renderQuestion() {
    if (currentQ >= questions.length) {
      showComplete(level, score, questions.length);
      return;
    }

    const q = questions[currentQ];
    const buttons = q.options.map(opt =>
      `<button class="next-btn" onclick="checkAnswer('${opt}', '${q.romaji}')">${opt}</button>`
    ).join('');

    gameWrap.innerHTML = `
      <div class="prompt-box">
        <div class="prompt-main">${q.kanji}</div>
        <div class="prompt-sub">ローマ字を選んでください</div>
      </div>
      ${buttons}
    `;
  }

  window.checkAnswer = (selected, correct) => {
    if (selected === correct) {
      score++;
    }
    currentQ++;
    renderQuestion();
  };

  window.showComplete = async (level, score, total) => {
    const points = score * 10;
    try {
      await SuzuAuth.saveScore({ level, score, total, points, source: 'quiz' });
    } catch (e) {
      console.error('スコア保存エラー:', e);
    }

    gameWrap.innerHTML = `
      <div class="complete-screen show">
        <div class="complete-emoji">🎉</div>
        <div class="complete-title">完了！</div>
        <div class="complete-score">${score} / ${total} 正解 ｜ +${points}pt</div>
        <button class="back-home-btn" onclick="location.href='/'">HOME へ戻る</button>
      </div>
    `;
  };

  renderQuestion();
}
</script>
</body>
</html>
