<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらがなボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #fdf8f0;
    --panel: #ffffff;
    --ink: #2b2b3a;
    --accent: #e8654f;
    --accent2: #3d7ea6;
    --line: #e3dccf;
    --trace: #c9d3e2;
    --kana-font: "Klee One", "UD Digi Kyokasho N-R", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--kana-font);
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ---------- header / tabs ---------- */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 2px solid var(--line);
    flex-wrap: wrap;
  }
  header h1 { font-size: 20px; color: var(--accent); font-weight: 600; }
  nav { display: flex; gap: 6px; }
  .tab-btn {
    font-family: inherit; font-size: 17px; font-weight: 600;
    padding: 8px 20px; border: 2px solid var(--line); border-radius: 999px;
    background: #faf6ee; color: var(--ink); cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page { display: none; flex: 1; min-height: 0; }
  .page.active { display: flex; }

  /* ---------- whiteboard ---------- */
  #page-board { flex-direction: column; }
  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 14px; background: var(--panel); border-bottom: 2px solid var(--line);
  }
  .tool-group { display: flex; align-items: center; gap: 6px; }
  .tool-sep { width: 2px; height: 28px; background: var(--line); border-radius: 2px; }
  .color-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent; cursor: pointer;
  }
  .color-btn.selected { border-color: var(--ink); transform: scale(1.12); }
  .size-btn, .tool-btn, .small-btn {
    font-family: inherit; font-size: 15px; font-weight: 600;
    padding: 6px 14px; border-radius: 10px; border: 2px solid var(--line);
    background: #faf6ee; cursor: pointer; color: var(--ink);
  }
  .size-btn.selected, .tool-btn.selected { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .tool-btn.danger:active { background: #f6c9c0; }
  #trace-input {
    font-family: inherit; font-size: 18px; width: 150px;
    padding: 6px 10px; border: 2px solid var(--line); border-radius: 10px; background: #fff;
  }
  .canvas-wrap { position: relative; flex: 1; min-height: 0; }
  #bg-canvas, #draw-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #draw-canvas { touch-action: none; cursor: crosshair; }

  /* ---------- chart ---------- */
  #page-chart { flex-direction: column; overflow-y: auto; padding: 16px; gap: 14px; }
  .chart-controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .chart-controls .tool-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .kana-grid { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .kana-row { display: flex; gap: 8px; }
  .kana-cell {
    width: clamp(64px, 9vw, 110px); height: clamp(64px, 9vw, 110px);
    background: var(--panel); border: 2px solid var(--line); border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .kana-cell:hover { border-color: var(--accent); background: #fff3ef; }
  .kana-cell .k { font-size: clamp(30px, 4.5vw, 52px); line-height: 1.1; font-weight: 600; }
  .kana-cell .r { font-size: clamp(11px, 1.4vw, 15px); color: #9a9488; }
  .kana-cell.empty { visibility: hidden; }

  /* ---------- big view modal ---------- */
  #big-view {
    position: fixed; inset: 0; background: rgba(253,248,240,0.98); z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  #big-view.open { display: flex; }
  #big-char { font-size: min(48vh, 44vw); font-size: min(48dvh, 44vw); line-height: 1.05; font-weight: 600; }
  #big-romaji { font-size: 46px; color: var(--accent2); font-weight: 600; letter-spacing: 2px; }
  .big-btns { display: flex; gap: 12px; margin-top: 8px; }
  .big-btns button {
    font-family: inherit; font-size: 18px; font-weight: 600; padding: 10px 24px;
    border-radius: 999px; border: 2px solid var(--line); background: #fff; cursor: pointer;
  }
  .big-btns .primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nav-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    font-size: 42px; background: none; border: none; cursor: pointer; color: #b9b2a4; padding: 20px;
  }
  .nav-arrow:hover { color: var(--accent); }
  #arrow-prev { left: 8px; } #arrow-next { right: 8px; }

  /* ---------- quiz ---------- */
  #page-quiz { flex-direction: column; padding: 12px 16px; gap: 10px; overflow-y: auto; }
  .quiz-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-family: inherit; font-size: 15px; font-weight: 600;
    padding: 6px 14px; border-radius: 999px; border: 2px solid var(--line);
    background: #faf6ee; cursor: pointer; color: var(--ink);
  }
  .chip.selected { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  #quiz-card {
    flex: 1; min-height: 0; background: var(--panel); border: 3px solid var(--line);
    border-radius: 24px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; user-select: none; gap: 6px;
  }
  #quiz-question { font-size: min(38vh, 34vw); font-size: min(38dvh, 34vw); line-height: 1.05; font-weight: 600; }
  #quiz-question.romaji-q { font-size: min(24vh, 24vw); font-size: min(24dvh, 24vw); color: var(--ink); letter-spacing: 3px; }
  #quiz-answer { font-size: 52px; color: var(--accent); font-weight: 600; min-height: 64px; letter-spacing: 2px; }
  #quiz-answer.hidden-ans { visibility: hidden; }
  #quiz-hint { font-size: 15px; color: #b0a99a; }
  .quiz-bottom { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .quiz-bottom .tool-btn { font-size: 18px; padding: 10px 26px; }
  #quiz-next { background: var(--accent); border-color: var(--accent); color: #fff; }
  #quiz-progress { font-size: 17px; color: #8a8375; font-weight: 600; }

  /* ---------- choice quiz ---------- */
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(56px, auto); gap: 10px; width: 100%; max-width: 480px; padding: 0 20px; flex-shrink: 0; }
  .choice-btn {
    font-family: inherit; font-size: clamp(18px, 5vw, 26px); font-weight: 600; padding: 14px 8px;
    border-radius: 16px; border: 3px solid var(--line); background: #fff; cursor: pointer; color: var(--ink);
  }
  .choice-btn .num { font-size: 13px; color: #b0a99a; display: block; margin-bottom: 2px; font-weight: 700; }
  .choice-btn.correct { background: #e3f6e6; border-color: #4caf6b; }
  .choice-btn.wrong { background: #fbe4e0; border-color: var(--accent); }

  /* ---------- stroke order ---------- */
  .stroke-wrap { display: flex; gap: 4px; }
  .stroke-anim { width: min(30vh,26vw); height: min(30vh,26vw); width: min(30dvh,26vw); height: min(30dvh,26vw); background: #fff; border-radius: 12px; border: 2px solid var(--line); }
  .stroke-anim .guide { fill: none; stroke: #e3dccf; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
  .stroke-anim .draw { fill: none; stroke: var(--accent); stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
  .stroke-anim .num { font-size: 8px; fill: var(--accent2); font-weight: 700; font-family: sans-serif; }

  /* ---------- sync panel ---------- */
  .sync-btn {
    font-family: inherit; font-size: 14px; font-weight: 600; padding: 7px 14px;
    border-radius: 999px; border: 2px solid var(--accent2); background: #fff; color: var(--accent2); cursor: pointer;
    margin-left: auto;
  }
  .sync-btn.live { background: var(--accent2); color: #fff; }
  #sync-panel {
    position: fixed; inset: 0; background: rgba(43,43,58,0.55); z-index: 60;
    display: none; align-items: center; justify-content: center;
  }
  #sync-panel.open { display: flex; }
  .sync-box {
    background: #fff; border-radius: 20px; padding: 28px 32px; width: min(90vw, 420px);
    display: flex; flex-direction: column; gap: 14px; text-align: center;
  }
  .sync-box h2 { font-size: 20px; color: var(--accent); }
  .sync-tabs { display: flex; gap: 8px; justify-content: center; }
  .sync-tabs button {
    font-family: inherit; font-size: 15px; font-weight: 600; padding: 8px 16px;
    border-radius: 999px; border: 2px solid var(--line); background: #faf6ee; cursor: pointer;
  }
  .sync-tabs button.selected { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .sync-code-display { font-size: 46px; font-weight: 700; letter-spacing: 6px; color: var(--accent2); background: #f4f8fb; border-radius: 12px; padding: 14px; }
  .sync-status { font-size: 14px; color: #8a8375; min-height: 20px; }
  #join-code-input {
    font-family: inherit; font-size: 28px; text-align: center; letter-spacing: 6px;
    padding: 10px; border: 2px solid var(--line); border-radius: 12px; width: 100%; text-transform: uppercase;
  }
  .sync-box .tool-btn { align-self: center; }
  #sync-close { background: none; border: none; font-size: 15px; color: #b0a99a; cursor: pointer; }

  /* ---------- student full-screen mode ---------- */
  #student-mode { position: fixed; inset: 0; background: var(--bg); z-index: 40; display: none; flex-direction: column; }
  #student-mode.open { display: flex; }
  #student-canvas-wrap { position: relative; flex: 1; min-height: 0; }
  #student-bg, #student-draw { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
  .student-topbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--panel); border-bottom: 2px solid var(--line); flex-wrap: wrap; }
  #entry-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; }
  #entry-screen h2 { font-size: 22px; color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>ひらがなボード</h1>
  <nav>
    <button class="tab-btn active" data-page="board">✏️ ホワイトボード</button>
    <button class="tab-btn" data-page="chart">🗾 ひらがな表</button>
    <button class="tab-btn" data-page="quiz">🎴 クイズ</button>
  </nav>
  <button class="sync-btn" id="open-sync">🔗 みんなで書く</button>
</header>

<!-- ========== SYNC PANEL ========== -->
<div id="sync-panel">
  <div class="sync-box">
    <h2>みんなで書く</h2>
    <div class="sync-tabs">
      <button id="tab-host" class="selected">先生: 部屋を作る</button>
      <button id="tab-join">学生: 合言葉で参加</button>
    </div>
    <div id="sync-host-view">
      <p style="font-size:14px;color:#8a8375;">生徒はこの合言葉を自分のスマホ・PCの同じページに入力すると、指やマウスでいっしょに書けます。</p>
      <div class="sync-code-display" id="sync-code">----</div>
      <div class="sync-status" id="sync-host-status">部屋を作成中…</div>
    </div>
    <div id="sync-join-view" style="display:none;">
      <p style="font-size:14px;color:#8a8375;">先生から聞いた合言葉(4文字)を入力してください。</p>
      <input id="join-code-input" maxlength="4" placeholder="ABCD" />
      <button class="tool-btn selected" id="join-btn" style="align-self:center;">参加する</button>
      <div class="sync-status" id="sync-join-status"></div>
    </div>
    <button id="sync-close">閉じる</button>
  </div>
</div>

<!-- ========== STUDENT FULLSCREEN MODE ========== -->
<div id="student-mode">
  <div class="student-topbar">
    <div class="tool-group" id="s-colors">
      <button class="color-btn selected" data-color="#2b2b3a" style="background:#2b2b3a"></button>
      <button class="color-btn" data-color="#e8402a" style="background:#e8402a"></button>
      <button class="color-btn" data-color="#2867d6" style="background:#2867d6"></button>
      <button class="color-btn" data-color="#1f9d55" style="background:#1f9d55"></button>
    </div>
    <div class="tool-group" id="s-sizes">
      <button class="size-btn" data-size="6">細</button>
      <button class="size-btn selected" data-size="14">中</button>
      <button class="size-btn" data-size="26">太</button>
    </div>
    <button class="tool-btn" id="s-eraser-btn">消しゴム</button>
    <span id="s-status" style="font-size:13px;color:#8a8375;">接続中…</span>
    <button class="tool-btn danger" id="s-leave" style="margin-left:auto;">退出</button>
  </div>
  <div id="student-canvas-wrap">
    <canvas id="student-bg"></canvas>
    <canvas id="student-draw"></canvas>
  </div>
</div>

<!-- ========== WHITEBOARD ========== -->
<div class="page active" id="page-board">
  <div class="toolbar">
    <div class="tool-group" id="colors">
      <button class="color-btn selected" data-color="#2b2b3a" style="background:#2b2b3a"></button>
      <button class="color-btn" data-color="#e8402a" style="background:#e8402a"></button>
      <button class="color-btn" data-color="#2867d6" style="background:#2867d6"></button>
      <button class="color-btn" data-color="#1f9d55" style="background:#1f9d55"></button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group" id="sizes">
      <button class="size-btn" data-size="4">細</button>
      <button class="size-btn selected" data-size="9">中</button>
      <button class="size-btn" data-size="18">太</button>
    </div>
    <button class="tool-btn" id="eraser-btn">消しゴム</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="undo-btn">← もどす</button>
    <button class="tool-btn danger" id="clear-btn">ぜんぶ消す</button>
    <div class="tool-sep"></div>
    <div class="tool-group">
      <button class="tool-btn selected" id="bg-blank">白紙</button>
      <button class="tool-btn" id="bg-grid">マス目</button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group">
      <input id="trace-input" placeholder="なぞり文字 例: あいう" />
      <button class="tool-btn" id="trace-btn">なぞり表示</button>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="bg-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
  </div>
</div>

<!-- ========== CHART ========== -->
<div class="page" id="page-chart">
  <div class="chart-controls">
    <button class="tool-btn selected" data-set="seion">清音</button>
    <button class="tool-btn" data-set="dakuon">濁音・半濁音</button>
    <button class="tool-btn" data-set="youon">拗音</button>
  </div>
  <div class="kana-grid" id="kana-grid"></div>
</div>

<div id="big-view">
  <button class="nav-arrow" id="arrow-prev">◀</button>
  <div id="big-char"></div>
  <div class="stroke-wrap" id="stroke-wrap" style="display:none;"></div>
  <div id="big-romaji"></div>
  <div class="big-btns">
    <button id="big-stroke">✍️ 書き順を見る</button>
    <button class="primary" id="big-trace">✏️ ホワイトボードでなぞる</button>
    <button id="big-close">閉じる</button>
  </div>
  <button class="nav-arrow" id="arrow-next">▶</button>
</div>

<!-- ========== QUIZ ========== -->
<div class="page" id="page-quiz">
  <div class="quiz-controls" id="quiz-rows">
    <button class="small-btn" id="rows-all">全部えらぶ</button>
    <button class="small-btn" id="rows-none">クリア</button>
  </div>
  <div class="quiz-controls">
    <span style="font-weight:600">出題:</span>
    <button class="chip selected" id="mode-k2r">文字 → 読み</button>
    <button class="chip" id="mode-r2k">読み → 文字</button>
    <button class="chip" id="mode-choice">4択(チャットで回答)</button>
    <span style="flex:1"></span>
    <span id="quiz-progress"></span>
  </div>
  <div id="quiz-card">
    <div id="quiz-question">あ</div>
    <div id="quiz-answer" class="hidden-ans">a</div>
    <div id="quiz-hint">カードをクリックで答え / スペース=答え・→=次へ</div>
  </div>
  <div id="choice-card" style="display:none;flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:flex-start;gap:14px;overflow-y:auto;padding:16px 0;">
    <div id="choice-question" style="font-size:min(18vh,20vw);font-size:min(18dvh,20vw);line-height:1.05;font-weight:600;flex-shrink:0;">あ</div>
    <div class="choice-grid" id="choice-grid" style="flex-shrink:0;"></div>
    <div id="choice-hint" style="font-size:15px;color:#b0a99a;flex-shrink:0;">番号(1〜4)をチャットで送ってもらってね</div>
  </div>
  <div class="quiz-bottom">
    <button class="tool-btn" id="quiz-show">答えを見る</button>
    <button class="tool-btn" id="quiz-next">次へ →</button>
    <button class="tool-btn" id="quiz-shuffle">シャッフル</button>
  </div>
</div>

<script>
/* ================= data ================= */
const SEION_ROWS = [
  { name: "あ行", kana: [["あ","a"],["い","i"],["う","u"],["え","e"],["お","o"]] },
  { name: "か行", kana: [["か","ka"],["き","ki"],["く","ku"],["け","ke"],["こ","ko"]] },
  { name: "さ行", kana: [["さ","sa"],["し","shi"],["す","su"],["せ","se"],["そ","so"]] },
  { name: "た行", kana: [["た","ta"],["ち","chi"],["つ","tsu"],["て","te"],["と","to"]] },
  { name: "な行", kana: [["な","na"],["に","ni"],["ぬ","nu"],["ね","ne"],["の","no"]] },
  { name: "は行", kana: [["は","ha"],["ひ","hi"],["ふ","fu"],["へ","he"],["ほ","ho"]] },
  { name: "ま行", kana: [["ま","ma"],["み","mi"],["む","mu"],["め","me"],["も","mo"]] },
  { name: "や行", kana: [["や","ya"],null,["ゆ","yu"],null,["よ","yo"]] },
  { name: "ら行", kana: [["ら","ra"],["り","ri"],["る","ru"],["れ","re"],["ろ","ro"]] },
  { name: "わ行・ん", kana: [["わ","wa"],null,null,null,["を","o (wo)"],["ん","n"]] },
];
const DAKUON_ROWS = [
  { name: "が行", kana: [["が","ga"],["ぎ","gi"],["ぐ","gu"],["げ","ge"],["ご","go"]] },
  { name: "ざ行", kana: [["ざ","za"],["じ","ji"],["ず","zu"],["ぜ","ze"],["ぞ","zo"]] },
  { name: "だ行", kana: [["だ","da"],["ぢ","ji (di)"],["づ","zu (du)"],["で","de"],["ど","do"]] },
  { name: "ば行", kana: [["ば","ba"],["び","bi"],["ぶ","bu"],["べ","be"],["ぼ","bo"]] },
  { name: "ぱ行", kana: [["ぱ","pa"],["ぴ","pi"],["ぷ","pu"],["ぺ","pe"],["ぽ","po"]] },
];
const YOUON_ROWS = [
  { name: "きゃ行", kana: [["きゃ","kya"],["きゅ","kyu"],["きょ","kyo"]] },
  { name: "しゃ行", kana: [["しゃ","sha"],["しゅ","shu"],["しょ","sho"]] },
  { name: "ちゃ行", kana: [["ちゃ","cha"],["ちゅ","chu"],["ちょ","cho"]] },
  { name: "にゃ行", kana: [["にゃ","nya"],["にゅ","nyu"],["にょ","nyo"]] },
  { name: "ひゃ行", kana: [["ひゃ","hya"],["ひゅ","hyu"],["ひょ","hyo"]] },
  { name: "みゃ行", kana: [["みゃ","mya"],["みゅ","myu"],["みょ","myo"]] },
  { name: "りゃ行", kana: [["りゃ","rya"],["りゅ","ryu"],["りょ","ryo"]] },
  { name: "ぎゃ行", kana: [["ぎゃ","gya"],["ぎゅ","gyu"],["ぎょ","gyo"]] },
  { name: "じゃ行", kana: [["じゃ","ja"],["じゅ","ju"],["じょ","jo"]] },
  { name: "びゃ行", kana: [["びゃ","bya"],["びゅ","byu"],["びょ","byo"]] },
  { name: "ぴゃ行", kana: [["ぴゃ","pya"],["ぴゅ","pyu"],["ぴょ","pyo"]] },
];

/* ================= tabs ================= */
const tabs = document.querySelectorAll(".tab-btn");
tabs.forEach(btn => btn.addEventListener("click", () => showPage(btn.dataset.page)));
function showPage(name) {
  tabs.forEach(b => b.classList.toggle("active", b.dataset.page === name));
  document.querySelectorAll(".page").forEach(p => p.classList.toggle("active", p.id === "page-" + name));
  if (name === "board") requestAnimationFrame(resizeCanvases);
}

/* ================= whiteboard ================= */
const bgCanvas = document.getElementById("bg-canvas");
const drawCanvas = document.getElementById("draw-canvas");
const bgCtx = bgCanvas.getContext("2d");
const ctx = drawCanvas.getContext("2d");
let penColor = "#2b2b3a", penSize = 9, eraser = false;
let strokes = [], current = null;
let strokeCounter = 0;
const myClientId = "c" + Math.random().toString(36).slice(2, 9);
let bgMode = "blank"; // blank | grid | trace
let traceText = "";
let dpr = window.devicePixelRatio || 1;

function resizeCanvases() {
  const wrap = document.querySelector(".canvas-wrap");
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (!w || !h) return;
  for (const c of [bgCanvas, drawCanvas]) {
    c.width = w * dpr; c.height = h * dpr;
    c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  drawBackground();
  redrawStrokes();
}
window.addEventListener("resize", resizeCanvases);

function drawBackground() {
  const w = bgCanvas.width / dpr, h = bgCanvas.height / dpr;
  bgCtx.clearRect(0, 0, w, h);
  if (bgMode === "blank") return;
  const chars = bgMode === "trace" ? [...traceText] : ["", "", "", ""];
  const n = Math.max(chars.length, 1);
  const gap = 18;
  let size = Math.min(h * 0.72, (w - gap * (n + 1)) / n, 420);
  if (size < 40) size = 40;
  const totalW = n * size + (n - 1) * gap;
  let x = (w - totalW) / 2;
  const y = (h - size) / 2;
  for (let i = 0; i < n; i++) {
    // square
    bgCtx.strokeStyle = "#d8cfbe"; bgCtx.lineWidth = 2.5; bgCtx.setLineDash([]);
    bgCtx.strokeRect(x, y, size, size);
    // dashed cross
    bgCtx.strokeStyle = "#e6ddca"; bgCtx.lineWidth = 1.5; bgCtx.setLineDash([8, 8]);
    bgCtx.beginPath();
    bgCtx.moveTo(x + size / 2, y); bgCtx.lineTo(x + size / 2, y + size);
    bgCtx.moveTo(x, y + size / 2); bgCtx.lineTo(x + size, y + size / 2);
    bgCtx.stroke();
    bgCtx.setLineDash([]);
    // trace character
    if (chars[i]) {
      bgCtx.fillStyle = "#c9d3e2";
      bgCtx.font = `600 ${size * 0.78}px "Klee One", "Hiragino Maru Gothic ProN", sans-serif`;
      bgCtx.textAlign = "center"; bgCtx.textBaseline = "middle";
      bgCtx.fillText(chars[i], x + size / 2, y + size * 0.56);
    }
    x += size + gap;
  }
}

function redrawStrokes() {
  const w = drawCanvas.width / dpr, h = drawCanvas.height / dpr;
  ctx.clearRect(0, 0, w, h);
  for (const s of strokes) paintStroke(s);
}
function paintStroke(s) {
  ctx.globalCompositeOperation = s.eraser ? "destination-out" : "source-over";
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.eraser ? s.size * 4 : s.size;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  const p = s.points;
  if (p.length === 1) {
    ctx.arc(p[0][0], p[0][1], ctx.lineWidth / 2, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalCompositeOperation = s.eraser ? "destination-out" : "source-over";
    ctx.fill();
    return;
  }
  ctx.moveTo(p[0][0], p[0][1]);
  for (let i = 1; i < p.length; i++) ctx.lineTo(p[i][0], p[i][1]);
  ctx.stroke();
  ctx.globalCompositeOperation = "source-over";
}

drawCanvas.addEventListener("pointerdown", e => {
  drawCanvas.setPointerCapture(e.pointerId);
  const r = drawCanvas.getBoundingClientRect();
  const pt = [e.clientX - r.left, e.clientY - r.top];
  const id = myClientId + "-" + (++strokeCounter);
  current = { id, color: penColor, size: penSize, eraser, points: [pt] };
  strokes.push(current);
  redrawStrokes();
  sendSync({ t: "s", id, c: penColor, w: penSize, e: eraser ? 1 : 0, p: pt });
});
drawCanvas.addEventListener("pointermove", e => {
  if (!current) return;
  const r = drawCanvas.getBoundingClientRect();
  const pt = [e.clientX - r.left, e.clientY - r.top];
  current.points.push(pt);
  redrawStrokes();
  sendSync({ t: "p", id: current.id, p: pt });
});
const endStroke = () => { current = null; };
drawCanvas.addEventListener("pointerup", endStroke);
drawCanvas.addEventListener("pointercancel", endStroke);

document.querySelectorAll("#colors .color-btn").forEach(b => b.addEventListener("click", () => {
  penColor = b.dataset.color; eraser = false;
  document.querySelectorAll("#colors .color-btn").forEach(x => x.classList.toggle("selected", x === b));
  document.getElementById("eraser-btn").classList.remove("selected");
}));
document.querySelectorAll("#sizes .size-btn").forEach(b => b.addEventListener("click", () => {

/* ================= sync (みんなで書く) ================= */
let peer = null, conns = [], isHost = false, connected = false, roomCode = null;

function sendSync(msg) {
  if (!connected && !isHost) return;
  broadcast(msg, null);
}
function broadcast(msg, exceptConn) {
  conns.forEach(c => { if (c !== exceptConn && c.open) c.send(msg); });
}
function makeRoomCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
function currentTarget() {
  return studentModeEl.classList.contains("open")
    ? { strokes: sStrokes, redraw: redrawSStrokes }
    : { strokes, redraw: redrawStrokes };
}
function handleIncoming(data, fromConn) {
  const t = currentTarget();
  if (data.t === "s") {
    t.strokes.push({ id: data.id, color: data.c, size: data.w, eraser: !!data.e, points: [data.p] });
    t.redraw();
  } else if (data.t === "p") {
    const s = t.strokes.find(x => x.id === data.id);
    if (s) { s.points.push(data.p); t.redraw(); }
  } else if (data.t === "clear") {
    t.strokes.length = 0; t.redraw();
  } else if (data.t === "undo") {
    const idx = t.strokes.findIndex(x => x.id === data.id);
    if (idx >= 0) { t.strokes.splice(idx, 1); t.redraw(); }
  }
  if (isHost) broadcast(data, fromConn);
}
function setupConn(conn) {
  conn.on("data", data => handleIncoming(data, conn));
  conn.on("close", () => { conns = conns.filter(c => c !== conn); updateHostStatus(); });
  conn.on("open", () => updateHostStatus());
}
function updateHostStatus() {
  const el = document.getElementById("sync-host-status");
  if (el) el.textContent = conns.length ? `${conns.length}人が参加中です` : "生徒の参加を待っています…";
}

}

/* ---- student full-screen board ---- */
const studentModeEl = document.getElementById("student-mode");
const sBgCanvas = document.getElementById("student-bg");
const sDrawCanvas = document.getElementById("student-draw");
const sCtx = sDrawCanvas.getContext("2d");
let sStrokes = [], sCurrent = null, sPenColor = "#2b2b3a", sPenSize = 14, sEraser = false, sStrokeCounter = 0;

function resizeStudentCanvas() {
  const wrap = document.getElementById("student-canvas-wrap");
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (!w || !h) return;
  for (const c of [sBgCanvas, sDrawCanvas]) {
    c.width = w * dpr; c.height = h * dpr;
    c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  redrawSStrokes();
}
window.addEventListener("resize", () => { if (studentModeEl.classList.contains("open")) resizeStudentCanvas(); });

function redrawSStrokes() {
  const w = sDrawCanvas.width / dpr, h = sDrawCanvas.height / dpr;
  sCtx.clearRect(0, 0, w, h);
  for (const s of sStrokes) paintStrokeOn(sCtx, s);
}
function paintStrokeOn(c, s) {
  c.globalCompositeOperation = s.eraser ? "destination-out" : "source-over";
  c.strokeStyle = s.color;
  c.lineWidth = s.eraser ? s.size * 4 : s.size;
  c.lineCap = "round"; c.lineJoin = "round";
  c.beginPath();
  const p = s.points;
  if (p.length === 1) {
    c.arc(p[0][0], p[0][1], c.lineWidth / 2, 0, Math.PI * 2);
    c.fillStyle = s.color;
    c.fill();
    c.globalCompositeOperation = "source-over";
    return;
  }
  c.moveTo(p[0][0], p[0][1]);
  for (let i = 1; i < p.length; i++) c.lineTo(p[i][0], p[i][1]);
  c.stroke();
  c.globalCompositeOperation = "source-over";
}
sDrawCanvas.addEventListener("pointerdown", e => {
  sDrawCanvas.setPointerCapture(e.pointerId);
  const r = sDrawCanvas.getBoundingClientRect();
  const pt = [e.clientX - r.left, e.clientY - r.top];
  const id = myClientId + "-s" + (++sStrokeCounter);
  sCurrent = { id, color: sPenColor, size: sPenSize, eraser: sEraser, points: [pt] };
  sStrokes.push(sCurrent);
  redrawSStrokes();
  sendSync({ t: "s", id, c: sPenColor, w: sPenSize, e: sEraser ? 1 : 0, p: pt });
});
sDrawCanvas.addEventListener("pointermove", e => {
  if (!sCurrent) return;
  const r = sDrawCanvas.getBoundingClientRect();
  const pt = [e.clientX - r.left, e.clientY - r.top];
  sCurrent.points.push(pt);
  redrawSStrokes();
  sendSync({ t: "p", id: sCurrent.id, p: pt });
});
const endSStroke = () => { sCurrent = null; };
sDrawCanvas.addEventListener("pointerup", endSStroke);
sDrawCanvas.addEventListener("pointercancel", endSStroke);
document.querySelectorAll("#s-colors .color-btn").forEach(b => b.addEventListener("click", () => {

/* ---- stroke order animation ---- */
function buildStrokeSVG(ch) {
  const d = KVG_DATA[ch];
  if (!d) return null;
  const guide = d.s.map(p => `<path class="guide" d="${p}"/>`).join("");
  const draw = d.s.map((p, i) => `<path class="draw" d="${p}" pathLength="1" style="stroke-dasharray:1;stroke-dashoffset:1;" data-i="${i}"/>`).join("");
  const nums = d.n.map((p, i) => `<text class="num" x="${p[0]}" y="${p[1]}">${i + 1}</text>`).join("");
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 109 109");
  svg.setAttribute("class", "stroke-anim");
  svg.innerHTML = guide + draw + nums;
  return svg;
}
function playSVG(svg) {
  return new Promise(resolve => {
    const paths = svg.querySelectorAll("path.draw");
    paths.forEach(p => { p.style.transition = "none"; p.style.strokeDashoffset = "1"; });
    void svg.getBoundingClientRect();
    paths.forEach((p, i) => {
      setTimeout(() => {
        p.style.transition = "stroke-dashoffset 0.55s ease-in-out";
        p.style.strokeDashoffset = "0";
      }, i * 650);
    });
    setTimeout(resolve, paths.length * 650 + 550);
  });
}
async function playStrokeOrder(chars) {
  for (const svg of strokeWrap.querySelectorAll(".stroke-anim")) {
    await playSVG(svg);
    await new Promise(r => setTimeout(r, 250));
  }
}
document.getElementById("big-stroke").addEventListener("click", async () => {
  const [k] = flatList[bigIndex];
  if (!strokeShown) {
    strokeWrap.innerHTML = "";
    let any = false;
    for (const ch of [...k]) {
      const svg = buildStrokeSVG(ch);
      if (svg) { strokeWrap.appendChild(svg); any = true; }
    }
    if (!any) { strokeWrap.innerHTML = "<p style='font-size:14px;color:#b0a99a;'>この文字の書き順データはありません</p>"; }
    strokeWrap.style.display = "flex";
    bigCharEl.style.display = "none";
    strokeShown = true;
  }
  playStrokeOrder([...k]);
});
document.getElementById("big-trace").addEventListener("click", () => {

/* ================= quiz ================= */
const rowChips = [];
const quizRowsEl = document.getElementById("quiz-rows");
const CHIP_GROUPS = [
  ...SEION_ROWS.map(r => ({ label: r.name, items: r.kana.filter(Boolean) })),
  { label: "濁音", items: DAKUON_ROWS.slice(0, 4).flatMap(r => r.kana.filter(Boolean)) },
  { label: "半濁音", items: DAKUON_ROWS[4].kana.filter(Boolean) },
  { label: "拗音", items: YOUON_ROWS.flatMap(r => r.kana.filter(Boolean)) },
];
CHIP_GROUPS.forEach((g, i) => {
  const chip = document.createElement("button");
  chip.className = "chip" + (i === 0 ? " selected" : "");
  chip.textContent = g.label;
  chip.addEventListener("click", () => { chip.classList.toggle("selected"); buildDeck(); });
  quizRowsEl.insertBefore(chip, document.getElementById("rows-all"));
  rowChips.push(chip);
});
document.getElementById("rows-all").addEventListener("click", () => { rowChips.forEach(c => c.classList.add("selected")); buildDeck(); });
document.getElementById("rows-none").addEventListener("click", () => { rowChips.forEach(c => c.classList.remove("selected")); buildDeck(); });

let quizMode = "k2r"; // k2r: 文字→読み, r2k: 読み→文字, choice: 4択
const modeK2R = document.getElementById("mode-k2r");
const modeR2K = document.getElementById("mode-r2k");
const modeChoice = document.getElementById("mode-choice");
const quizCardEl = document.getElementById("quiz-card");
const choiceCardEl = document.getElementById("choice-card");
modeK2R.addEventListener("click", () => setMode("k2r"));
modeR2K.addEventListener("click", () => setMode("r2k"));
modeChoice.addEventListener("click", () => setMode("choice"));
function setMode(m) {
  quizMode = m;
  modeK2R.classList.toggle("selected", m === "k2r");
  modeR2K.classList.toggle("selected", m === "r2k");
  modeChoice.classList.toggle("selected", m === "choice");
  quizCardEl.style.display = m === "choice" ? "none" : "flex";
  choiceCardEl.style.display = m === "choice" ? "flex" : "none";
  showCard();
}

let deck = [], deckPos = 0, revealed = false;
function buildDeck() {
  deck = [];
  CHIP_GROUPS.forEach((g, i) => { if (rowChips[i].classList.contains("selected")) deck.push(...g.items); });
  shuffle(deck);
  deckPos = 0;
  showCard();
}
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}
const qEl = document.getElementById("quiz-question");
const aEl = document.getElementById("quiz-answer");
const progEl = document.getElementById("quiz-progress");
const choiceQEl = document.getElementById("choice-question");
const choiceGridEl = document.getElementById("choice-grid");
function showCard() {
  revealed = false;
  aEl.classList.add("hidden-ans");
  if (!deck.length) {
    qEl.textContent = "行をえらんでね";
    qEl.classList.add("romaji-q");
    aEl.textContent = "";
    progEl.textContent = "";
    choiceQEl.textContent = "行をえらんでね";
    choiceGridEl.innerHTML = "";
    return;
  }
  const [k, r] = deck[deckPos];
  if (quizMode === "choice") {
    showChoice(k, r);
  } else if (quizMode === "k2r") {
    qEl.textContent = k; qEl.classList.remove("romaji-q");
    aEl.textContent = r;
  } else {
    qEl.textContent = r; qEl.classList.add("romaji-q");
    aEl.textContent = k;
  }
  progEl.textContent = `${deckPos + 1} / ${deck.length}`;
}
function showChoice(k, r) {
  choiceQEl.textContent = k;
  const pool = deck.filter(item => item[1] !== r);
  shuffle(pool);
  const distractors = pool.slice(0, 3).map(item => item[1]);
  const options = [r, ...distractors];
  shuffle(options);
  choiceGridEl.innerHTML = "";
  options.forEach((opt, idx) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="num">${idx + 1}</span>${opt}`;
    btn.addEventListener("click", () => {
      choiceGridEl.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      btn.classList.add(opt === r ? "correct" : "wrong");
      if (opt !== r) {
        choiceGridEl.querySelectorAll(".choice-btn").forEach(b => { if (b.textContent.trim().endsWith(r)) b.classList.add("correct"); });
      }
      revealed = true;
    });
    choiceGridEl.appendChild(btn);
  });
  progEl.textContent = `${deckPos + 1} / ${deck.length}`;
}
function reveal() {
  if (!deck.length) return;
  if (quizMode === "choice") {
    const [, r] = deck[deckPos];
    choiceGridEl.querySelectorAll(".choice-btn").forEach(b => { b.disabled = true; if (b.textContent.trim().endsWith(r)) b.classList.add("correct"); });
    revealed = true;
    return;
  }
  revealed = true; aEl.classList.remove("hidden-ans");
}
function nextCard() {
  if (!deck.length) return;
  if (!revealed) { reveal(); return; }
  deckPos++;
  if (deckPos >= deck.length) { shuffle(deck); deckPos = 0; }
  showCard();
}
document.getElementById("quiz-card").addEventListener("click", () => revealed ? nextCard() : reveal());
document.getElementById("quiz-show").addEventListener("click", reveal);
document.getElementById("quiz-next").addEventListener("click", () => { revealed = true; nextCard(); });
document.getElementById("quiz-shuffle").addEventListener("click", buildDeck);
document.addEventListener("keydown", e => {
  if (!document.getElementById("page-quiz").classList.contains("active")) return;
  if (e.target.tagName === "INPUT") return;
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); revealed ? nextCard() : reveal(); }
  if (e.key === "ArrowRight") { revealed = true; nextCard(); }
  if (quizMode === "choice" && /^[1-4]$/.test(e.key)) {
    const btn = choiceGridEl.children[+e.key - 1];
    if (btn && !btn.disabled) btn.click();
  }
});

/* ================= init ================= */
renderChart();
buildDeck();
resizeCanvases();
if (document.fonts && document.fonts.ready) document.fonts.ready.then(drawBackground);
