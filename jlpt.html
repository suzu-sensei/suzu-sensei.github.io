<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本語 JLPT Cards</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="suzu-auth.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --sumi:#3B2424;--sumi-mid:#8A5148;
  --washi:#FFFCF7;--washi-dark:#F5EDE2;
  --torii:#C0392B;--torii-light:#E8604C;
  --n4:#2D6A4F;--n4-l:#52B788;
  --n3:#B5640A;--n3-l:#F4A261;
  --n2:#7B1D1D;--n2-l:#E63946;
  --n1:#1A237E;--n1-l:#90CAF9;
  --ink:#1C1C1E;--ink-mid:#48484A;--muted:#A28B7E;
  --app-bg:#FAF6F0;
  --hdr:#6B3D3D;
}
body{background:var(--app-bg);min-height:100dvh;font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic UI',Arial,sans-serif;color:var(--ink);display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:var(--hdr);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.15);position:sticky;top:0;z-index:50;}
.h-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.h-title em{color:#F2CFA5;font-style:normal;}
.h-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;}
.jlpt-lang-switcher{display:flex;gap:0;flex-shrink:0;}
.jlpt-lang-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);padding:3px 9px;font-size:10px;letter-spacing:0.5px;color:rgba(255,255,255,0.75);cursor:pointer;}
.jlpt-lang-btn:first-child{border-radius:6px 0 0 6px;}
.jlpt-lang-btn:last-child{border-radius:0 6px 6px 0;border-left:none;}
.jlpt-lang-btn:not(:first-child){border-left:none;}
.jlpt-lang-btn.active{background:#fff;color:var(--hdr);border-color:#fff;}
.tabs{width:100%;display:flex;background:var(--sumi-mid);border-bottom:1px solid rgba(255,255,255,.1);}
.tab{flex:1;padding:10px 2px;font-size:11px;font-weight:800;color:rgba(255,255,255,.65);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-align:center;}
.tab.n4.active{color:var(--n4-l);border-bottom-color:var(--n4-l);}
.tab.n3.active{color:var(--n3-l);border-bottom-color:var(--n3-l);}
.tab.n2.active{color:var(--n2-l);border-bottom-color:var(--n2-l);}
.tab.n1.active{color:var(--n1-l);border-bottom-color:var(--n1-l);}
.tab.all.active{color:#F2CFA5;border-bottom-color:#F2CFA5;}
.prog-wrap{width:100%;height:3px;background:rgba(0,0,0,.08);}
.prog-fill{height:100%;background:linear-gradient(90deg,#C9897A,#E8604C);transition:width .4s;}
main{width:100%;max-width:480px;padding:12px 13px 100px;flex:1;}

/* CARD */
.card{background:var(--washi);border-radius:20px;margin-bottom:13px;box-shadow:0 4px 24px rgba(107,61,61,.18),inset 0 1px 0 rgba(255,255,255,.8);overflow:hidden;cursor:pointer;transition:transform .15s;user-select:none;}
.card:active{transform:scale(.98);}
.lvl-stripe{height:5px;width:100%;}
.lvl-stripe.n4{background:linear-gradient(90deg,var(--n4),var(--n4-l));}
.lvl-stripe.n3{background:linear-gradient(90deg,var(--n3),var(--n3-l));}
.lvl-stripe.n2{background:linear-gradient(90deg,var(--n2),var(--n2-l));}
.lvl-stripe.n1{background:linear-gradient(90deg,var(--n1),var(--n1-l));}
.card-top{padding:16px 20px 12px;text-align:center;}
.lvl-badge{display:inline-block;font-size:9px;font-weight:900;letter-spacing:1.5px;padding:3px 9px;border-radius:20px;margin-bottom:10px;}
.lvl-badge.n4{background:var(--n4);color:var(--n4-l);}
.lvl-badge.n3{background:var(--n3);color:var(--n3-l);}
.lvl-badge.n2{background:var(--n2);color:#ffb3b3;}
.lvl-badge.n1{background:var(--n1);color:var(--n1-l);}
.cat-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(107,61,61,.1);color:#6B3D3D;margin-left:5px;margin-bottom:10px;}
.kanji-only{font-size:54px;font-weight:800;color:var(--sumi);font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;line-height:1.2;margin-bottom:4px;}
.ruby-wrap{display:inline-block;text-align:center;margin-bottom:4px;}
.ruby-wrap ruby{font-size:52px;font-weight:800;color:var(--sumi);font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;line-height:1.3;}
.ruby-wrap ruby rt{font-size:13px;font-weight:600;color:var(--torii);font-family:'Hiragino Sans',sans-serif;letter-spacing:1px;}
.romaji{font-size:14px;color:var(--muted);font-style:italic;margin-bottom:6px;}
.pos-tag{font-size:10px;background:rgba(192,57,43,.1);color:var(--torii);border-radius:8px;padding:2px 8px;font-weight:700;display:inline-block;margin-bottom:8px;}
.audio-btn{display:inline-flex;align-items:center;gap:5px;background:var(--hdr);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-top:3px;transition:background .15s;}
.audio-btn.playing{background:var(--torii);}
.card-divider{height:1px;background:rgba(107,61,61,.1);margin:0 18px;}
.card-bottom{padding:12px 18px 16px;}
.tap-hint{font-size:12px;color:var(--muted);text-align:center;font-style:italic;padding:4px 0;}
.meaning-block{margin-bottom:8px;}
.lang-label{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.meaning-text{font-size:20px;font-weight:800;color:var(--sumi);line-height:1.25;}
.meaning-text.zh{font-family:'PingFang TC','Noto Sans TC',sans-serif;}
.fitb-wrap{margin-top:10px;}
.fitb-label{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.fitb-sent{font-size:15px;font-weight:600;color:var(--sumi);line-height:1.9;background:var(--washi-dark);border-radius:12px;padding:10px 13px;border-left:3px solid #C9897A;}
.blank{display:inline-block;background:#3B2424;color:#3B2424;border-radius:4px;padding:1px 5px;min-width:2em;text-align:center;cursor:pointer;transition:all .3s;vertical-align:middle;font-size:15px;font-weight:800;line-height:1.4;white-space:nowrap;}
.blank.shown{background:rgba(201,137,122,.15);color:#6B3D3D;}
.fitb-trans{font-size:12px;color:var(--ink-mid);margin-top:6px;padding:0 2px;line-height:1.5;}
.tip-box{font-size:11px;color:var(--ink-mid);background:rgba(201,137,122,.07);border-radius:9px;padding:8px 11px;margin-top:8px;line-height:1.5;border-left:2px solid #C9897A;}

/* 長音・促音ガイドボックス */
.phonics-box{background:linear-gradient(135deg,#F7F0E9,#FAF6F0);border-radius:16px;padding:14px 16px;margin-bottom:13px;border:1.5px solid rgba(201,137,122,.3);}
.phonics-title{font-size:11px;font-weight:900;letter-spacing:1px;color:#6B3D3D;text-transform:uppercase;margin-bottom:10px;}
.phonics-rule{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.phonics-rule:last-child{margin-bottom:0;}
.phonics-rule-title{font-size:12px;font-weight:800;color:#3B2424;margin-bottom:4px;}
.phonics-rule-body{font-size:11px;color:#48484A;line-height:1.6;}
.phonics-ex{display:inline-block;background:rgba(201,137,122,.12);border-radius:6px;padding:1px 7px;margin:2px 2px;font-size:12px;font-weight:700;color:#6B3D3D;}
.phonics-wrong{display:inline-block;background:rgba(192,57,43,.1);border-radius:6px;padding:1px 7px;margin:2px 2px;font-size:12px;font-weight:700;color:#C0392B;text-decoration:line-through;}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--hdr);border-top:1px solid rgba(255,255,255,.15);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;}
nav button{flex:1;background:none;border:none;color:rgba(255,255,255,.65);font-size:9px;font-weight:700;letter-spacing:.3px;cursor:pointer;padding:4px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
nav button.active{color:#F2CFA5;}
nav button .icon{font-size:18px;}

/* QUIZ */
.quiz-progress-bar{width:100%;height:6px;background:rgba(107,61,61,.15);border-radius:3px;margin-bottom:12px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#C9897A,#F2CFA5);border-radius:3px;transition:width .4s;}
.quiz-score{color:#3B2424;text-align:center;font-size:13px;font-weight:700;margin-bottom:10px;background:rgba(255,255,255,.6);border-radius:12px;padding:6px 12px;}
.quiz-card{background:var(--washi);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(107,61,61,.2);margin-bottom:14px;}
.quiz-card-body{padding:20px 18px 22px;text-align:center;}
.quiz-kanji{font-size:58px;font-weight:800;color:var(--sumi);font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;line-height:1.15;margin:8px 0 4px;}
.quiz-meaning{font-size:14px;color:var(--ink-mid);margin-bottom:4px;font-weight:600;}
.quiz-pos{font-size:10px;background:rgba(192,57,43,.1);color:var(--torii);border-radius:8px;padding:2px 8px;font-weight:700;display:inline-block;margin-bottom:14px;}
.answer-slots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.slot{width:40px;height:44px;border-radius:10px;border:2px solid rgba(201,137,122,.3);background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--sumi);cursor:pointer;transition:all .2s;}
.slot.filled{background:rgba(201,137,122,.15);border-color:#C9897A;color:#6B3D3D;}
.slot.correct-anim{background:var(--n4);border-color:var(--n4);color:#fff;transform:scale(1.08);}
.slot.wrong-anim{background:var(--torii);border-color:var(--torii);color:#fff;}
.kana-pool{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;}
.kana-tile{width:44px;height:44px;border-radius:10px;background:#C9897A;color:#fff;border:2px solid #2C1F1F;font-size:19px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.kana-tile:active{transform:scale(.93);}
.kana-tile.used{opacity:.2;pointer-events:none;}
.kana-tile.hint-glow{box-shadow:0 0 0 3px var(--n3-l);}
.quiz-feedback{font-size:14px;font-weight:800;text-align:center;margin-top:10px;min-height:24px;padding:6px;}
.quiz-feedback.ok{color:#2D6A4F;}
.quiz-feedback.ng{color:var(--torii);}
.quiz-hint-row{display:flex;justify-content:center;gap:10px;margin-top:12px;}
.quiz-hint-btn{background:rgba(107,61,61,.1);border:none;border-radius:12px;padding:8px 16px;font-size:11px;font-weight:700;color:#6B3D3D;cursor:pointer;}
.next-btn{display:block;width:100%;background:linear-gradient(135deg,#C9897A,#6B3D3D);color:#fff;border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;margin-top:14px;box-shadow:0 4px 16px rgba(107,61,61,.35);}

/* RESULT */
.result-wrap{background:linear-gradient(135deg,#FBF7F2,#F5EAE2);border-radius:24px;padding:24px 20px;text-align:center;}
.result-emoji{font-size:56px;margin-bottom:8px;}
.result-title{font-size:22px;font-weight:900;color:#3B2424;margin-bottom:4px;}
.result-score-big{font-size:48px;font-weight:900;color:#6B3D3D;margin:10px 0;}
.result-score-label{font-size:13px;color:#A28B7E;margin-bottom:16px;}
.result-cheer{font-size:15px;font-weight:700;color:#3B2424;background:rgba(255,255,255,.7);border-radius:14px;padding:12px 16px;margin-bottom:16px;line-height:1.5;}
.result-section{text-align:left;margin-bottom:14px;}
.result-section-title{font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#A28B7E;margin-bottom:8px;}
.result-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:7px;box-shadow:0 2px 8px rgba(107,61,61,.1);}
.result-item-kanji{font-size:22px;font-weight:800;font-family:'Hiragino Mincho ProN','Yu Mincho',serif;color:#3B2424;min-width:44px;text-align:center;}
.result-item-info{flex:1;}
.result-item-kana{font-size:13px;color:#6B3D3D;font-weight:700;}
.result-item-en{font-size:12px;color:#48484A;}
.result-item-icon{font-size:20px;}
.result-retry-btn{display:block;width:100%;background:linear-gradient(135deg,#C9897A,#6B3D3D);color:#fff;border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(107,61,61,.35);}

/* LIST */
.list-row{display:flex;align-items:center;gap:10px;padding:12px 13px;border-bottom:1px solid rgba(107,61,61,.08);cursor:pointer;background:#fff;}
.list-row:first-child{border-radius:16px 16px 0 0;}
.list-row:last-child{border-bottom:none;border-radius:0 0 16px 16px;}
.list-kanji{font-size:28px;font-weight:800;font-family:'Hiragino Mincho ProN','Yu Mincho',serif;color:#3B2424;min-width:48px;text-align:center;line-height:1.2;}
.list-info{flex:1;min-width:0;}
.list-reading{color:#A28B7E;font-size:11px;}
.list-meaning-en{color:#1C1C1E;font-size:13px;font-weight:700;}
.list-meaning-zh{color:#48484A;font-size:12px;font-family:'PingFang TC','Noto Sans TC',sans-serif;}
.list-detail{display:none;font-size:11px;color:#6B3D3D;margin-top:4px;line-height:1.45;}
.list-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.list-lvl{font-size:9px;font-weight:900;padding:2px 7px;border-radius:10px;}
.list-lvl.n4{background:var(--n4);color:var(--n4-l);}
.list-lvl.n3{background:var(--n3);color:var(--n3-l);}
.list-lvl.n2{background:var(--n2);color:#ffb3b3;}
.list-lvl.n1{background:var(--n1);color:var(--n1-l);}
.list-audio-sm{background:rgba(107,61,61,.12);border:none;border-radius:50%;width:30px;height:30px;color:#6B3D3D;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.counter-badge{color:rgba(255,255,255,.75);font-size:12px;font-weight:700;}

/* ── GAMIFICATION / NEW GAMES ── */
.gam-badge{display:flex;gap:10px;align-items:center;color:#F2CFA5;font-size:11px;font-weight:800;}
.choice-btn{display:block;width:100%;background:#fff;border:2px solid #2C1F1F;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:700;color:var(--sumi);cursor:pointer;margin-bottom:9px;text-align:left;transition:all .15s;line-height:1.5;}
.choice-btn:active{transform:scale(.98);}
.choice-btn.ok{background:var(--n4);border-color:var(--n4);color:#fff;}
.choice-btn.ng{background:var(--torii);border-color:var(--torii);color:#fff;}
.choice-btn.dim{opacity:.5;pointer-events:none;}
.ff-explain{background:#fff;border-radius:14px;padding:12px 14px;margin-top:12px;text-align:left;font-size:13px;line-height:1.75;box-shadow:0 2px 10px rgba(107,61,61,.12);}
.vs-scorebar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.75);border-radius:14px;padding:9px 14px;margin-bottom:10px;font-size:13px;font-weight:800;color:var(--sumi);text-align:center;}
.vs-timer{font-size:14px;font-weight:900;color:var(--torii);text-align:center;margin-bottom:8px;}
.league-row{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:9px 12px;margin-bottom:6px;box-shadow:0 1px 6px rgba(107,61,61,.08);font-size:13px;}
.league-row.me{border:2px solid #C9897A;background:linear-gradient(135deg,#F7ECFC,#fff);}
.league-rank{width:28px;text-align:center;font-weight:900;color:#6B3D3D;font-size:14px;}
.league-name{flex:1;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.league-pts{font-weight:900;color:#6B3D3D;}
.zone-label{font-size:10px;font-weight:900;letter-spacing:1px;text-align:center;margin:8px 0 6px;}
.medal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.medal{background:#fff;border-radius:12px;padding:9px 4px 7px;text-align:center;box-shadow:0 1px 6px rgba(107,61,61,.08);}
.medal-e{font-size:26px;line-height:1.2;}
.medal-n{font-size:9px;font-weight:700;color:var(--ink-mid);margin-top:2px;}
.medal-d{font-size:8px;color:var(--muted);}
.medal.locked{filter:grayscale(1);opacity:.45;}
.medal-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#3B2424;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:800;z-index:999;box-shadow:0 6px 24px rgba(0,0,0,.3);animation:mt .3s;max-width:90%;}
@keyframes mt{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%)}}
.sec-title{font-size:12px;font-weight:900;letter-spacing:1px;color:#6B3D3D;margin:18px 0 8px;text-transform:uppercase;}
.big-start-btn{display:block;width:100%;background:linear-gradient(135deg,#C9897A,#6B3D3D);color:#fff;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;margin-top:14px;box-shadow:0 4px 16px rgba(107,61,61,.35);}

</style>
</head>
<body>
<header>
  <div>
    <a href="index.html" style="color:rgba(255,255,255,.55);font-size:10px;text-decoration:none;font-weight:700;">← HOME</a>
    <div class="h-title">日本語 <em>JLPT</em> Cards</div>
    <div class="h-sub">Daily conversation · 日常会話</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div class="jlpt-lang-switcher">
      <button class="jlpt-lang-btn active" id="jl-en" onclick="setLang('en',this)">EN</button>
      <button class="jlpt-lang-btn" id="jl-zh" onclick="setLang('zh',this)">繁中</button>
      <button class="jlpt-lang-btn" id="jl-both" onclick="setLang('both',this)">Both</button>
    </div>
    <div class="counter-badge" id="card-counter">— words</div>
    <div class="gam-badge"><span>🔥 <span id="streak-d">0</span>日</span><span>⭐ <span id="pts-d">0</span>pt</span></div>
    <div id="suzu-login-wrap"></div>
  </div>
</header>
<div style="width:100%;display:flex;background:#F2E0D5;border-bottom:1px solid rgba(107,61,61,.12);">
  <a href="quiz.html#t1" id="nl-t1" style="flex:1;padding:11px 2px;font-size:11px;text-align:center;color:#2C1F1F;text-decoration:none;letter-spacing:1px;white-space:nowrap;">漢字クイズ</a>
  <a href="quiz.html#t2" id="nl-t2" style="flex:1;padding:11px 2px;font-size:11px;text-align:center;color:#2C1F1F;text-decoration:none;letter-spacing:1px;white-space:nowrap;">日付・動詞</a>
  <a href="quiz.html#t3" id="nl-t3" style="flex:1;padding:11px 2px;font-size:11px;text-align:center;color:#2C1F1F;text-decoration:none;letter-spacing:1px;white-space:nowrap;">て形クイズ</a>
  <a href="#" onclick="setView('league');return false;" id="nl-rank" style="flex:1;padding:11px 2px;font-size:11px;text-align:center;color:#2C1F1F;text-decoration:none;letter-spacing:1px;white-space:nowrap;">🏆 ランキング</a>
  <span id="nl-jlpt" style="flex:1;padding:8px 2px 11px;font-size:11px;text-align:center;color:#6B3D3D;font-weight:700;border-bottom:3px solid #C9897A;white-space:nowrap;">📖 JLPT単語</span>
</div>
<div class="tabs">
  <button class="tab all active" onclick="setLevel('all',this)">ALL</button>
  <button class="tab n4" onclick="setLevel('N4',this)">N4★</button>
  <button class="tab n3" onclick="setLevel('N3',this)">N3★★</button>
  <button class="tab n2" onclick="setLevel('N2',this)">N2★★★</button>
  <button class="tab n1" onclick="setLevel('N1',this)">N1★★★★</button>
</div>
<div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:2%"></div></div>
<main id="main"></main>
<nav>

//  STATE
// ════════════════════════════════════════════════
let curLevel='all',curView='cards',curLang='en';
let revealed=new Set(),blankShown=new Set();
// T(ja,zh,en): UI chrome translation helper. 'both' mode uses Japanese UI (matches original design intent).
function T(ja,zh,en){ return curLang==='zh'?zh:(curLang==='en'?en:ja); }
// langPair(en,zh): for content that has both an EN and ZH version (e.g. quiz answer options).
// Shows only the selected language; in 'both' mode, stacks both on separate lines.
function langPair(en,zh){
  if(curLang==='en') return en;
  if(curLang==='zh') return zh;
  return en+'<br>'+zh;
}
// splitEnZh('english／chinese') -> {en, zh}
function splitEnZh(s){
  const parts=s.split('／');
  return { en: parts[0]||s, zh: parts[1]||s };
}
let jpVoice=null;
let quizSession=[],quizQueue=[],qState=null;

// ════════════════════════════════════════════════
//  SPEECH
// ════════════════════════════════════════════════
function initSpeech(){
  if(!window.speechSynthesis) return;
  function load(){const vs=speechSynthesis.getVoices();jpVoice=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'))||null;}
  load();
  if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=load;
}
function speak(text,btn){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.82;u.pitch=1.0;
  if(jpVoice) u.voice=jpVoice;
  if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing');}
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function filtered(){return curLevel==='all'?W:W.filter(w=>w.level===curLevel);}
function safe(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function badge(w){return '<span class="lvl-badge '+w.level.toLowerCase()+'">'+w.level+'</span><span class="cat-tag">'+w.cat+'</span>';}
function stripe(w){return '<div class="lvl-stripe '+w.level.toLowerCase()+'"></div>';}
function abtn(text,id){return '<button class="audio-btn" id="'+id+'" onclick="event.stopPropagation();speak(\''+safe(text)+'\',document.getElementById(\''+id+'\'))">▶ '+T('発音','發音','Play')+'</button>';}

function meaningHtml(w){
  let h='';
  if(curLang==='en'||curLang==='both'){h+='<div class="meaning-block">';if(curLang==='both')h+='<div class="lang-label">English</div>';h+='<div class="meaning-text">'+w.en+'</div></div>';}
  if(curLang==='zh'||curLang==='both'){h+='<div class="meaning-block">';if(curLang==='both')h+='<div class="lang-label">繁體中文</div>';h+='<div class="meaning-text zh">'+w.zh+'</div></div>';}
  return h;
}

function fitbHtml(w,idx,shown){
  const key=w.fitb_key;
  const escaped=key.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const blankHtml=shown
    ?'<span class="blank shown">'+key+'</span>'
    :'<span class="blank" onclick="event.stopPropagation();showBlank('+idx+')">'+('＿'.repeat(Math.max(2,key.length)))+'</span>';
  const blanked=w.ex_jp.replace(new RegExp(escaped,'g'),blankHtml);
  let trans='';
  if(curLang==='en'||curLang==='both') trans+='<div>'+w.ex_en+'</div>';
  if(curLang==='zh'||curLang==='both') trans+='<div style="font-family:PingFang TC,sans-serif">'+w.ex_zh+'</div>';
  const fitbLabel=curLang==='both'?'📝 填空練習 · Fill in the blank':'📝 '+T('穴埋め練習','填空練習','Fill in the blank');
  return '<div class="fitb-wrap"><div class="fitb-label">'+fitbLabel+'</div><div class="fitb-sent">'+blanked+'</div>'+(shown?'<div class="fitb-trans">'+trans+'</div>':'')+'</div>';
}

function tipHtml(w){
  let t='';
  if(curLang==='en'||curLang==='both') t+='<b>EN:</b> '+w.tip_en+'<br>';
  if(curLang==='zh'||curLang==='both') t+='<b>中:</b> '+w.tip_zh;
  return '<div class="tip-box">💡 '+t+'</div>';
}

    +'<div class="phonics-rule-body">'

    +'<span class="phonics-ex">きゃ</span>'+T('は「き」+「や」ではなく','不是「き」+「や」，而是','is not "ki" + "ya" — it\'s')+' <b>kya</b> '+T('で1拍','算1拍','as one beat')+'<br>'

function toggleReveal(i){
  if(revealed.has(i)){revealed.delete(i);blankShown.delete(i);}else revealed.add(i);
  renderCards();
}
function showBlank(i){
  blankShown.add(i);
  const el=document.getElementById('blank-'+i);
  if(!el) return;
  const words=filtered();
  el.textContent=words[i].fitb_key;el.classList.add('shown');
  const fw=el.closest('.fitb-wrap');
  if(fw&&!fw.querySelector('.fitb-trans')){
    const w=words[i];let t='<div class="fitb-trans">';
    if(curLang==='en'||curLang==='both') t+='<div>'+w.ex_en+'</div>';
    if(curLang==='zh'||curLang==='both') t+='<div style="font-family:PingFang TC,sans-serif">'+w.ex_zh+'</div>';
    t+='</div>';fw.insertAdjacentHTML('beforeend',t);
  }
}
function updateCounter(words){
  document.getElementById('card-counter').textContent=words.length+' words';
  const pct=words.length?Math.round((revealed.size/words.length)*100):0;
  document.getElementById('prog-fill').style.width=Math.max(2,pct)+'%';
}

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function splitKana(s){
  const sm='ぁぃぅぇぉっゃゅょゎァィゥェォッャュョヮ';
  const r=[];
  for(let i=0;i<s.length;i++){
    if(i+1<s.length&&sm.includes(s[i+1])){r.push(s[i]+s[i+1]);i++;}
    else r.push(s[i]);
  }
  return r;
}

function startNewSession(){
  const words=filtered();
  if(words.length<2){document.getElementById('main').innerHTML='<div style="color:#3B2424;text-align:center;padding:40px;font-size:14px;background:rgba(255,255,255,.6);border-radius:16px;margin:20px;">'+T('単語が少なすぎます。','單字太少了。','Not enough words.')+'</div>';return;}
  quizSession=[];quizQueue=shuffle(words).slice(0,Math.min(10,words.length));qState=null;
  loadNextQuestion();
}

function loadNextQuestion(){
  if(quizQueue.length===0){showResult();return;}
  const word=quizQueue.shift();
  const kana=splitKana(word.kana);
  const all='あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん'.split('');
  const dist=shuffle(all.filter(k=>!kana.includes(k))).slice(0,Math.min(3,kana.length));
  const pool=shuffle([...kana,...dist]);
  qState={word,answer:kana,slots:new Array(kana.length).fill(null),pool,poolUsed:new Array(pool.length).fill(false),done:false,correct:false,questionNum:quizSession.length+1};
  renderQuiz();
}

function renderQuiz(){
  if(!qState){startNewSession();return;}
  const {word,answer,slots,pool,poolUsed,done,correct,questionNum}=qState;
  const sessionTotal=Math.min(10,filtered().length);
  const doneCount=quizSession.length+(done?1:0);
  const correctCount=quizSession.filter(r=>r.correct).length;
  let mLine='';
  if(curLang==='en'||curLang==='both') mLine+='<div>'+word.en+'</div>';
  if(curLang==='zh'||curLang==='both') mLine+='<div style="font-family:PingFang TC,sans-serif">'+word.zh+'</div>';
  let sHtml='<div class="answer-slots">';
  slots.forEach((s,i)=>{let cls='slot';if(s!==null){if(done)cls='slot '+(s===answer[i]?'correct-anim':'wrong-anim');else cls='slot filled';}sHtml+='<div class="'+cls+'" onclick="removeSlot('+i+')">'+(s||'')+'</div>';});
  sHtml+='</div>';
  let pHtml='<div class="kana-pool">';
  pool.forEach((k,i)=>{pHtml+='<button class="kana-tile'+(poolUsed[i]?' used':'')+'" onclick="placeKana('+i+')">'+k+'</button>';});
  pHtml+='</div>';
  const pct=Math.round((doneCount/sessionTotal)*100);
  let fbSection='';
  if(done){
    fbSection=(correct?'<div class="quiz-feedback ok">✅ '+T('正解！ 読み：','答對了！讀音：','Correct! Reading: ')+word.kana+'</div>':'<div class="quiz-feedback ng">❌ '+T('正解は… ','正確答案是… ','The answer is… ')+word.kana+'</div>')
      +'<button class="next-btn" onclick="goNextQuestion()">'+T('次の問題へ →','下一題 →','Next question →')+'</button>';
  }else{
    fbSection='<div class="quiz-feedback" id="q-fb"></div><div class="quiz-hint-row"><button class="quiz-hint-btn" onclick="hintQuiz()">💡 '+T('ヒント','提示','Hint')+'</button><button class="quiz-hint-btn" onclick="skipQuizQ()">⏭ '+T('スキップ','跳過','Skip')+'</button></div>';
  }
  const qi='qa'+Date.now();
  document.getElementById('main').innerHTML=
    '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="quiz-score">'+T('問題','問題','Question')+' '+questionNum+' / '+sessionTotal+' ｜ ✅ '+T(correctCount+'問正解',correctCount+'題正確',correctCount+' correct')+'</div>'
    +'<div class="quiz-card">'+stripe(word)
    +'<div class="quiz-card-body">'+badge(word)
    +'<div class="quiz-kanji">'+word.kanji+'</div>'
    +'<div class="quiz-meaning">'+mLine+'</div>'
    +'<div class="quiz-pos">'+word.pos+'</div>'
    +'<button class="audio-btn" id="'+qi+'" style="margin-bottom:16px;" onclick="speak(\''+safe(word.kana)+'\',document.getElementById(\''+qi+'\'))">▶ '+T('発音','發音','Play')+'</button>'
    +sHtml+fbSection+pHtml+'</div></div>';
}

function placeKana(i){
  if(!qState||qState.done||qState.poolUsed[i]) return;
  const e=qState.slots.indexOf(null);if(e===-1) return;
  qState.slots[e]=qState.pool[i];qState.poolUsed[i]=true;
  if(qState.slots.indexOf(null)===-1) checkAnswer();else renderQuiz();
}
function removeSlot(i){
  if(!qState||qState.done) return;
  const r=qState.slots[i];if(r===null) return;
  qState.slots[i]=null;
  for(let j=0;j<qState.pool.length;j++){if(qState.pool[j]===r&&qState.poolUsed[j]){qState.poolUsed[j]=false;break;}}
  renderQuiz();
}
function checkAnswer(){
  if(!qState) return;
  qState.done=true;qState.correct=qState.slots.every((s,i)=>s===qState.answer[i]);
  quizSession.push({word:qState.word,correct:qState.correct,rightAnswer:qState.word.kana});
  renderQuiz();
}
function goNextQuestion(){quizQueue.length===0?showResult():loadNextQuestion();}
function skipQuizQ(){
  if(!qState) return;
  quizSession.push({word:qState.word,correct:false,rightAnswer:qState.word.kana});
  quizQueue.length===0?showResult():loadNextQuestion();
}
function hintQuiz(){
  if(!qState||qState.done) return;
  for(let i=0;i<qState.answer.length;i++){
    if(qState.slots[i]===null){
      for(let j=0;j<qState.pool.length;j++){
        if(qState.pool[j]===qState.answer[i]&&!qState.poolUsed[j]){
          const t=document.querySelectorAll('.kana-tile')[j];
          if(t){t.classList.add('hint-glow');setTimeout(()=>t.classList.remove('hint-glow'),1200);}break;
        }
      }break;
    }
  }
}

function getCheerMsg(s,t){
  const p=s/t;
  if(p===1) return{emoji:'🏆',title:T('パーフェクト！','完美！','Perfect!'),msg:T('全問正解！本物の実力ですね。この調子で上を目指しましょう！継続は力なり🌟','全部答對！這是真本事。保持這個狀態繼續加油！堅持就是力量🌟','All correct! That\'s real skill. Keep this up — consistency is the key to progress 🌟')};
  if(p>=0.8) return{emoji:'🎉',title:T('すごい！','太厲害了！','Amazing!'),msg:T('よくできました！もう少しで完璧。間違えた問題を確認して次は満点を！💪','做得很好！只差一點就完美了。檢查錯的題目，下次拿滿分！💪','Great job! So close to perfect. Review what you missed and aim for full marks next time! 💪')};
  if(p>=0.6) return{emoji:'👍',title:T('なかなかいいね！','還不錯喔！','Not bad!'),msg:T('半分以上正解！少しずつ上達しています。苦手語を重点練習してみて📚','答對一半以上！正在慢慢進步。試著加強練習不擅長的單字📚','More than half correct! You\'re improving little by little. Focus extra practice on your weak words 📚')};
  if(p>=0.4) return{emoji:'💡',title:T('まだまだこれから！','還有進步空間！','Room to grow!'),msg:T('練習あるのみ！繰り返しが日本語上達の近道。焦らず続けて🌱','就是要多練習！反覆練習是進步日語的捷徑。別著急，繼續加油🌱','Practice is everything! Repetition is the shortcut to improving your Japanese. Take your time and keep going 🌱')};
  return{emoji:'🌸',title:T('一緒にがんばろう！','一起加油吧！','Let\'s keep at it together!'),msg:T('難しかったかな？でも大丈夫！諦めなければ必ず上達します。応援してる❤️','覺得有點難嗎？沒關係！只要不放棄，一定會進步的。我會一直支持你❤️','Was that tough? No worries! As long as you don\'t give up, you\'ll improve. Cheering for you ❤️')};
}

function showResult(){
  const total=quizSession.length,correct=quizSession.filter(r=>r.correct).length;
  const wrong=quizSession.filter(r=>!r.correct),right=quizSession.filter(r=>r.correct);
  const c=getCheerMsg(correct,total);addPoints(correct*10);
  let wHtml='',rHtml='';
  wrong.forEach(r=>{wHtml+='<div class="result-item"><div class="result-item-icon">❌</div><div class="result-item-kanji">'+r.word.kanji+'</div><div class="result-item-info"><div class="result-item-kana">'+T('正解：','正確答案：','Correct: ')+r.rightAnswer+'</div><div class="result-item-en">'+r.word.en+'</div></div></div>';});
  right.forEach(r=>{rHtml+='<div class="result-item"><div class="result-item-icon">✅</div><div class="result-item-kanji">'+r.word.kanji+'</div><div class="result-item-info"><div class="result-item-kana">'+r.rightAnswer+'</div><div class="result-item-en">'+r.word.en+'</div></div></div>';});
  document.getElementById('main').innerHTML='<div class="result-wrap">'
    +'<div class="result-emoji">'+c.emoji+'</div><div class="result-title">'+c.title+'</div>'
    +'<div class="result-score-big">'+correct+' / '+total+'</div>'
    +'<div class="result-score-label">'+T('正解率','正確率','Accuracy')+' '+Math.round(correct/total*100)+'% ｜ +'+(correct*10)+T('pt獲得','pt獲得','pt earned')+'</div>'
    +'<div class="result-cheer">'+c.msg+'</div>'
    +(wrong.length?'<div class="result-section"><div class="result-section-title">❌ '+T('間違えた単語（'+wrong.length+'問）','答錯的單字（'+wrong.length+'題）','Missed words ('+wrong.length+')')+'</div>'+wHtml+'</div>':'')
    +(right.length?'<div class="result-section"><div class="result-section-title">✅ '+T('正解した単語（'+right.length+'問）','答對的單字（'+right.length+'題）','Correct words ('+right.length+')')+'</div>'+rHtml+'</div>':'')
    +'<button class="result-retry-btn" onclick="startNewSession()">🔄 '+T('もう一度10問チャレンジ！','再挑戰10題！','Try 10 more!')+'</button></div>';
  qState=null;
}

function setLang(l,el){
  curLang=l;document.querySelectorAll('.jlpt-lang-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  else { const b=document.getElementById('jl-'+l); if(b) b.classList.add('active'); }
  updateNavLabels();
  renderLoginHeader();
  if(curView==='league') renderLeague();
  else if(curView==='trap'||curView==='kata') { if(cq) renderChoiceQ(); else renderChoiceIntro(curView); }
  else if(curView==='versus') renderVersus();
  else renderView();
}
function setView(v){
  if(typeof stopVsTimer==='function')stopVsTimer();
  curView=v;document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+v);if(nb)nb.classList.add('active');
  if(v==='quiz'){startNewSession();return;}
  if(v==='trap'){cq=null;renderChoiceIntro('trap');return;}
  if(v==='kata'){cq=null;renderChoiceIntro('kata');return;}
  if(v==='versus'){vs=null;renderVersus();return;}
  if(v==='league'){renderLeague();return;}
  renderView();
}
function renderView(){
  if(curView==='cards') renderCards();
  else if(curView==='quiz') renderQuiz();
  else if(curView==='list') renderList();
}

const GKEY='suzuJlptGame';
function gload(){try{return JSON.parse(localStorage.getItem(GKEY))||{days:{},earned:[]};}catch(e){return{days:{},earned:[]};}}
function gsave(g){try{localStorage.setItem(GKEY,JSON.stringify(g));}catch(e){}}
function dkey(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isoWeek(d){d=new Date(d.getTime());d.setHours(0,0,0,0);d.setDate(d.getDate()+3-((d.getDay()+6)%7));const w1=new Date(d.getFullYear(),0,4);return d.getFullYear()+'-W'+String(1+Math.round(((d-w1)/864e5-3+((w1.getDay()+6)%7))/7)).padStart(2,'0');}
function addPoints(n){const g=gload();const k=dkey();g.days[k]=(g.days[k]||0)+n;gsave(g);checkMedals();updateGamBadges();
  // ログイン中なら Supabase にもポイントを送る（ランキング用）
  if(window.SuzuAuth&&SuzuAuth.isLoggedIn()){SuzuAuth.saveScore({points:n,source:'jlpt',level:curLevel});}
}
// ── ヘッダーのログイン表示 ──
function renderLoginHeader(){
  const el=document.getElementById('suzu-login-wrap');if(!el||!window.SuzuAuth)return;
  if(SuzuAuth.isLoggedIn()){
    el.innerHTML='<span style="font-size:10px;color:rgba(255,255,255,.75);">👤 '+escapeHtmlJ(SuzuAuth.nickname())+' <button onclick="SuzuAuth.logout();location.reload();" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:6px;padding:2px 6px;font-size:9px;cursor:pointer;margin-left:3px;">'+T('ログアウト','登出','Log Out')+'</button></span>';
  }else{
    el.innerHTML='<button onclick="jlptLogin()" style="background:#fff;color:#6B3D3D;border:none;border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;">🔑 '+T('ログインして記録','登入以記錄成績','Log In to Save Score')+'</button>';
  }
}
function jlptLogin(){ if(window.SuzuAuth) SuzuAuth.prompt(()=>{ renderLoginHeader(); if(curView==='league') renderLeague(); }); }
function escapeHtmlJ(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function getStreak(){const g=gload();let s=0;const d=new Date();if(!g.days[dkey(d)])d.setDate(d.getDate()-1);while(g.days[dkey(d)]){s++;d.setDate(d.getDate()-1);}return s;}
function weekPts(){const g=gload();const wk=isoWeek(new Date());let t=0;for(const k in g.days){if(isoWeek(new Date(k+'T12:00:00'))===wk)t+=g.days[k];}return t;}
function totalPts(){const g=gload();let t=0;for(const k in g.days)t+=g.days[k];return t;}
function updateGamBadges(){const s=document.getElementById('streak-d'),p=document.getElementById('pts-d');if(s)s.textContent=getStreak();if(p)p.textContent=weekPts();}

function checkMedals(){const g=gload();const s=getStreak();const nw=[];MEDALS.forEach((m,i)=>{if(s>=m.d&&g.earned.indexOf(i)===-1){g.earned.push(i);nw.push(m);}});if(nw.length){gsave(g);showMedalToast(nw);}}

{n:'佳穎 Jiaying',a:'📚',lv:2},{n:'ユウタ',a:'⚽',lv:0},{n:'心怡 Xinyi',a:'🌺',lv:1},{n:'アオイ',a:'💤',lv:0},
{n:'俊傑 Junjie',a:'🚴',lv:0},{n:'ノゾミ',a:'🍰',lv:1},{n:'大衛 David',a:'🎧',lv:0}];
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return h;}
function botWeekPts(b){
  const rnd=mulberry(hashStr(isoWeek(new Date())+b.n));
  const dow=((new Date().getDay()+6)%7)+1;
  let pts=0;
  for(let d=0;d<dow;d++){
    const r=rnd();
    if(b.lv===0){if(r<0.25)pts+=Math.floor(rnd()*40);}
    else if(b.lv===1){if(r<0.7)pts+=20+Math.floor(rnd()*90);}
    else{pts+=60+Math.floor(rnd()*160);}
  }
  return pts;
}
function leagueName(){const t=totalPts();if(t<300)return['ブロンズ','🥉'];if(t<800)return['シルバー','🥈'];if(t<1600)return['ゴールド','🥇'];if(t<3000)return['サファイア','💎'];if(t<5000)return['ルビー','❤️‍🔥'];return['ダイヤモンド','👑'];}

  MEDALS.forEach((m,i)=>{

}

// ════════════════════════════════════════════════
let cq=null;
function renderChoiceIntro(mode){
  const t=mode==='trap'
    ?{e:'🪤',t:T('罠漢字クイズ','陷阱漢字測驗','Trap Kanji Quiz'),d:T('日本語と台湾華語で<b>意味が違う</b>漢字語！<br>「勉強」「手紙」「愛人」…引っかからないでね😏','日語和台灣華語<b>意思不同</b>的漢字詞！<br>「勉強」「手紙」「愛人」…可別上當了😏','Kanji words that mean <b>something different</b> in Japanese vs. Taiwanese Mandarin!<br>勉強, 手紙, 愛人… don\'t fall for the trap 😏')}
    :{e:'🍔',t:T('カタカナ語クイズ','片假名外來語測驗','Katakana Word Quiz'),d:T('アルバイト？コンセント？マンション？<br>英語だと思ったら大間違いのカタカナ語10問！','アルバイト？コンセント？マンション？<br>10題你以為是英語，其實完全不是的片假名詞！','Arubaito? Consento? Manshon?<br>10 katakana words that look like English but definitely aren\'t!')};
  document.getElementById('main').innerHTML='<div class="result-wrap">'
    +'<div class="result-emoji">'+t.e+'</div><div class="result-title">'+t.t+'</div>'
    +'<div class="result-cheer">'+t.d+'</div>'
    +'<div style="font-size:12px;color:#A28B7E;">'+T('全10問 ｜ 1問正解＝10pt（ランキングに加算）','共10題 ｜ 每答對1題＝10pt（計入排行榜）','10 questions total | 10pt per correct answer (counts toward ranking)')+'</div>'
    +'<button class="big-start-btn" onclick="startChoiceQuiz(\''+mode+'\')">'+T('挑戦する！','開始挑戰！','Start Challenge!')+'</button></div>';
}
function startChoiceQuiz(mode){
  const src=mode==='trap'?FF:KATA;
  cq={mode,qs:shuffle(src).slice(0,10),i:0,correct:0,answered:false,picked:-1,opts:null,scored:false};
  cq.opts=buildChoices(cq);
  renderChoiceQ();
}
function buildChoices(c){
  const item=c.qs[c.i];const src=c.mode==='trap'?FF:KATA;
  let opts;
  if(c.mode==='trap'){
    opts=[{t:langPair(item.en,item.jz),ok:1},{t:item.tw,ok:0}];
    shuffle(src.filter(x=>x!==item)).slice(0,2).forEach(o=>opts.push({t:langPair(o.en,o.jz),ok:0}));
  }else{
    const mk=splitEnZh(item.m);
    opts=[{t:langPair(mk.en,mk.zh),ok:1}];
    shuffle(src.filter(x=>x!==item)).slice(0,3).forEach(o=>{const ok=splitEnZh(o.m);opts.push({t:langPair(ok.en,ok.zh),ok:0});});
  }
  return shuffle(opts);
}
function renderChoiceQ(){
  const c=cq;if(!c)return;
  const item=c.qs[c.i];const word=item.w;
  const fs=word.length>6?'30px':word.length>4?'40px':'52px';
  let ch='';
  c.opts.forEach((o,j)=>{
    let cls='choice-btn';
    if(c.answered){if(o.ok)cls+=' ok';else if(j===c.picked)cls+=' ng';else cls+=' dim';}
    ch+='<button class="'+cls+'" onclick="pickChoice('+j+')">'+o.t+'</button>';
  });
  let ex='';
  if(c.answered){
    ex=c.mode==='trap'
      ?'<div class="ff-explain">📖 '+T('読み：','讀音：','Reading: ')+'<b>'+item.kana+'</b><br>🇯🇵 '+T('日本語：','日語：','Japanese: ')+'<b>'+item.jp+'</b>（'+item.jz+'）<br>🇹🇼 '+T('台湾華語：','台灣華語：','Taiwanese Mandarin: ')+item.tw+'<br>💡 '+T(item.tip,item.tip_zh||item.tip,item.tip_en||item.tip)+'</div>'
      :'<div class="ff-explain">✅ '+T('意味：','意思：','Meaning: ')+'<b>'+item.m+'</b><br>🔤 '+T(item.o,item.o_zh||item.o,item.o_en||item.o)+'</div>';
    ex+='<button class="next-btn" onclick="nextChoice()">'+(c.i===c.qs.length-1?T('結果を見る →','查看結果 →','See results →'):T('次の問題へ →','下一題 →','Next question →'))+'</button>';
  }
  const pct=Math.round(((c.i+(c.answered?1:0))/c.qs.length)*100);
  document.getElementById('main').innerHTML=
    '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="quiz-score">'+T('問題','問題','Question')+' '+(c.i+1)+' / '+c.qs.length+' ｜ ✅ '+T(c.correct+'問正解',c.correct+'題正確',c.correct+' correct')+'</div>'
    +'<div class="quiz-card"><div class="lvl-stripe" style="background:linear-gradient(90deg,#C9897A,#E8604C);"></div>'
    +'<div class="quiz-card-body">'
    +'<div style="font-size:11px;font-weight:800;color:#A28B7E;letter-spacing:1px;margin-bottom:4px;">'+(c.mode==='trap'?'🪤 '+T('日本語での意味は？','日語裡的意思是？','What does this mean in Japanese?'):'🍔 '+T('このカタカナ語の意味は？','這個片假名詞的意思是？','What does this katakana word mean?'))+'</div>'
    +'<div class="quiz-kanji" style="font-size:'+fs+';">'+word+'</div>'
    +'<div style="margin-top:10px;">'+ch+'</div>'+ex+'</div></div>';
}
function pickChoice(j){
  const c=cq;if(!c||c.answered)return;
  c.answered=true;c.picked=j;
  if(c.opts[j].ok)c.correct++;
  renderChoiceQ();
}
function nextChoice(){
  const c=cq;if(!c)return;
  if(c.i>=c.qs.length-1){showChoiceResult();return;}
  c.i++;c.answered=false;c.picked=-1;c.opts=buildChoices(c);
  renderChoiceQ();
}
function showChoiceResult(){
  const c=cq;const total=c.qs.length;const ch=getCheerMsg(c.correct,total);
  if(!c.scored){c.scored=true;addPoints(c.correct*10);}
  document.getElementById('main').innerHTML='<div class="result-wrap">'
    +'<div class="result-emoji">'+ch.emoji+'</div><div class="result-title">'+ch.title+'</div>'
    +'<div class="result-score-big">'+c.correct+' / '+total+'</div>'
    +'<div class="result-score-label">'+T('獲得ポイント','獲得分數','Points earned')+' +'+(c.correct*10)+T('pt（ランキングに加算）','pt（計入排行榜）','pt (counts toward ranking)')+'</div>'
    +'<div class="result-cheer">'+ch.msg+'</div>'
    +'<button class="result-retry-btn" onclick="startChoiceQuiz(\''+c.mode+'\')">🔄 '+T('もう一度挑戦！','再挑戰一次！','Try again!')+'</button>'
    +'<button class="result-retry-btn" style="background:#fff;color:#6B3D3D;margin-top:8px;box-shadow:none;border:2px solid #C9897A;" onclick="setView(\'league\')">🏆 '+T('リーグを見る','查看排行榜','View leaderboard')+'</button></div>';
}

// ════════════════════════════════════════════════
//  タイムアタック対戦 vs さくらさん（正答率70〜85%）
// ════════════════════════════════════════════════
let vs=null;
function vsPool(){
  return W.map(w=>({d:w.kanji,s:w.kana,m:langPair(w.en,w.zh)}))
    .concat(FF.map(f=>({d:f.w,s:f.kana,m:langPair(f.en,f.jz)})))
    .concat(KATA.map(k=>{const mk=splitEnZh(k.m);return {d:k.w,s:'',m:langPair(mk.en,mk.zh)};}));
}
function renderVersusIntro(){
  document.getElementById('main').innerHTML='<div class="result-wrap">'
    +'<div class="result-emoji">⚔️</div><div class="result-title">'+T('タイムアタック対戦','限時對戰','Time Attack Battle')+'</div>'
    +'<div class="result-cheer">🌸 '+T('<b>さくらさん</b>と同じ10問で真剣勝負！<br>得点＝正解×スピード（1問最大120pt）。<br>速く、正確に！','和<b>櫻花小姐</b>用同樣的10題一決勝負！<br>得分＝正確率×速度（每題最高120pt）。<br>又快又準！','A serious 10-question showdown against <b>Sakura</b>!<br>Score = correctness × speed (up to 120pt per question).<br>Be fast and accurate!')+'</div>'
    +'<div style="font-size:12px;color:#A28B7E;margin-bottom:4px;">'+T('さくらさん：日本語ガチ勢のライバル🌸 かなり強いよ…','櫻花小姐：日語超強的勁敵🌸 相當厲害喔…','Sakura: a serious Japanese-language rival 🌸 She\'s pretty strong…')+'</div>'
    +'<button class="big-start-btn" onclick="startVersus()">'+T('対戦スタート！','開始對戰！','Start the Battle!')+'</button></div>';
}
function startVersus(){
  const pool=shuffle(vsPool());
  const qs=pool.slice(0,10).map(item=>({item,opts:shuffle([{t:item.m,ok:1}].concat(shuffle(pool.filter(x=>x!==item)).slice(0,3).map(o=>({t:o.m,ok:0}))))}));
  vs={qs,i:0,my:0,bot:0,myC:0,botC:0,acc:0.70+Math.random()*0.15,phase:'q',t0:Date.now(),timer:null,last:null,scored:false};
  startVsTimer();renderVersus();
}
function startVsTimer(){
  stopVsTimer();vs.t0=Date.now();
  vs.timer=setInterval(()=>{const e=document.getElementById('vs-timer');if(e)e.textContent=((Date.now()-vs.t0)/1000).toFixed(1);},100);
}
function stopVsTimer(){if(vs&&vs.timer){clearInterval(vs.timer);vs.timer=null;}}
function vsAnswer(j){
  const v=vs;if(!v||v.phase!=='q')return;
  stopVsTimer();
  const el=(Date.now()-v.t0)/1000;
  const q=v.qs[v.i];const ok=q.opts[j].ok===1;
  const gain=ok?Math.max(20,Math.round(120-el*8)):0;
  const bok=Math.random()<v.acc;
  const bt=2.5+Math.random()*5;
  const bgain=bok?Math.max(20,Math.round(120-bt*8)):0;
  v.my+=gain;v.bot+=bgain;if(ok)v.myC++;if(bok)v.botC++;
  v.last={j,ok,gain,el,bok,bt,bgain};
  v.phase='r';renderVersus();
}
function vsNext(){
  const v=vs;if(!v)return;
  if(v.i>=v.qs.length-1){
    v.phase='f';
    if(!v.scored){v.scored=true;addPoints(Math.round(v.my/10)+(v.my>v.bot?50:10));}
    renderVersus();return;
  }
  v.i++;v.phase='q';startVsTimer();renderVersus();
}
function renderVersus(){
  if(!vs){renderVersusIntro();return;}
  const v=vs;
  if(v.phase==='f'){
    const win=v.my>v.bot,draw=v.my===v.bot;
    document.getElementById('main').innerHTML='<div class="result-wrap">'
      +'<div class="result-emoji">'+(win?'🏆':draw?'🤝':'😢')+'</div>'
      +'<div class="result-title">'+(win?T('勝利！さくらさんに勝った！','勝利！贏過櫻花小姐了！','Victory! You beat Sakura!'):draw?T('引き分け！','平手！','A draw!'):T('惜敗…さくらさん強い！','惜敗…櫻花小姐好強！','So close… Sakura is strong!'))+'</div>'
      +'<div class="vs-scorebar" style="margin-top:12px;"><span>🧑‍🎓 '+T('あなた','你','You')+'<br><b style="font-size:22px;">'+v.my+'pt</b><br>'+v.myC+'/10'+T('問','題','')+'</span><span style="font-size:20px;">VS</span><span>🌸 '+T('さくら','櫻花','Sakura')+'<br><b style="font-size:22px;">'+v.bot+'pt</b><br>'+v.botC+'/10'+T('問','題','')+'</span></div>'
      +'<div class="result-score-label" style="margin-top:10px;">'+T('ポイント','分數','Points')+' +'+(Math.round(v.my/10)+(win?50:10))+'pt '+T('獲得','獲得','earned')+'</div>'
      +'<button class="result-retry-btn" onclick="startVersus()">⚔️ '+T('再戦する！','再戰一次！','Rematch!')+'</button>'
      +'<button class="result-retry-btn" style="background:#fff;color:#6B3D3D;margin-top:8px;box-shadow:none;border:2px solid #C9897A;" onclick="setView(\'league\')">🏆 '+T('リーグを見る','查看排行榜','View leaderboard')+'</button></div>';
    return;
  }
  const q=v.qs[v.i];const item=q.item;
  const fs=item.d.length>6?'30px':item.d.length>4?'40px':'50px';
  let ch='';
  q.opts.forEach((o,j)=>{
    let cls='choice-btn';
    if(v.phase==='r'){if(o.ok)cls+=' ok';else if(j===v.last.j)cls+=' ng';else cls+=' dim';}
    ch+='<button class="'+cls+'" onclick="vsAnswer('+j+')">'+o.t+'</button>';
  });
  let mid='';
  if(v.phase==='q'){
    mid='<div class="vs-timer">⏱ <span id="vs-timer">0.0</span> '+T('秒','秒','sec')+'</div>';
  }else{
    const L=v.last;
    mid='<div class="ff-explain" style="text-align:center;">🧑‍🎓 '+(L.ok?'✅ +'+L.gain+'pt':'❌ +0pt')+'（'+L.el.toFixed(1)+T('秒','秒','s')+'）　🌸 '+(L.bok?'✅ +'+L.bgain+'pt':'❌ +0pt')+'（'+L.bt.toFixed(1)+T('秒','秒','s')+'）</div>'
      +'<button class="next-btn" onclick="vsNext()">'+(v.i===v.qs.length-1?T('結果発表 →','公布結果 →','See results →'):T('次の問題へ →','下一題 →','Next question →'))+'</button>';
  }
  document.getElementById('main').innerHTML=
    '<div class="vs-scorebar"><span>🧑‍🎓 '+v.my+'pt</span><span>Q'+(v.i+1)+'/10</span><span>🌸 '+v.bot+'pt</span></div>'
    +(v.phase==='q'?mid:'')
    +'<div class="quiz-card"><div class="lvl-stripe" style="background:linear-gradient(90deg,#E8604C,#C9897A);"></div>'
    +'<div class="quiz-card-body">'
    +'<div style="font-size:11px;font-weight:800;color:#A28B7E;letter-spacing:1px;margin-bottom:4px;">'+T('意味はどれ？','哪個是正確意思？','Which one is the meaning?')+'</div>'
    +'<div class="quiz-kanji" style="font-size:'+fs+';">'+item.d+'</div>'
    +(v.phase==='r'&&item.s?'<div style="font-size:13px;color:#6B3D3D;font-weight:700;margin-bottom:8px;">'+T('読み：','讀音：','Reading: ')+item.s+'</div>':'')
    +'<div style="margin-top:10px;">'+ch+'</div>'
    +(v.phase==='r'?mid:'')+'</div></div>';
}
